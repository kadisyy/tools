<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Maker — TOOLBOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f7f9ff;
  --border: #dde4f5;
  --border2: #c8d4f0;
  --blue: #0057ff;
  --blue2: #00aaff;
  --pink: #ff2d78;
  --green: #00c97a;
  --purple: #7c3aed;
  --text: #0a0e1a;
  --text2: #4a5578;
  --text3: #8896b8;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,87,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,87,255,0.05) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}

.app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 1px solid var(--border);
  background: rgba(240,244,255,0.85); backdrop-filter: blur(12px);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.back-btn {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  text-decoration: none; letter-spacing: 0.1em;
  border: 1px solid var(--border2); padding: 6px 14px;
  background: var(--surface); transition: all 0.15s;
}
.back-btn:hover { color: var(--blue); border-color: var(--blue); }
.header-title { font-family: var(--sans); font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
.header-badge {
  font-family: var(--mono); font-size: 10px; color: var(--green);
  border: 1px solid var(--green); padding: 3px 10px; letter-spacing: 0.1em;
}

.main { display: flex; flex: 1; overflow: hidden; }

.panel {
  width: 320px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow-y: auto; padding: 24px;
  display: flex; flex-direction: column; gap: 20px;
}
.section-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.15em; margin-bottom: 10px;
}

.upload-zone {
  border: 2px dashed var(--border2); padding: 32px 16px;
  text-align: center; cursor: pointer; transition: all 0.2s;
  background: var(--surface2); position: relative;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--blue); background: rgba(0,87,255,0.04); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-hint { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.upload-preview { width: 100%; aspect-ratio: 1; object-fit: cover; display: none; margin-top: 12px; }

.effect-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.effect-btn {
  padding: 10px 8px; border: 1px solid var(--border2);
  background: var(--surface2); cursor: pointer;
  font-family: var(--mono); font-size: 10px; color: var(--text2);
  letter-spacing: 0.08em; text-align: center; transition: all 0.15s;
}
.effect-btn:hover { border-color: var(--blue); color: var(--blue); }
.effect-btn.active, .txt-effect-btn.active { border-color: var(--blue); background: var(--blue); color: #fff; }
.txt-effect-btn {
  padding: 10px 8px; border: 1px solid var(--border2);
  background: var(--surface2); cursor: pointer;
  font-family: var(--mono); font-size: 10px; color: var(--text2);
  letter-spacing: 0.08em; text-align: center; transition: all 0.15s;
}
.txt-effect-btn:hover { border-color: var(--blue); color: var(--blue); }

.speed-row { display: flex; gap: 8px; }
.speed-btn {
  flex: 1; padding: 8px 4px; border: 1px solid var(--border2);
  background: var(--surface2); cursor: pointer;
  font-family: var(--mono); font-size: 10px; color: var(--text2);
  letter-spacing: 0.08em; text-align: center; transition: all 0.15s;
}
.speed-btn:hover { border-color: var(--green); color: var(--green); }
.speed-btn.active, .txt-speed-btn.active { border-color: var(--green); background: var(--green); color: #fff; }
.txt-speed-btn {
  flex: 1; padding: 8px 4px; border: 1px solid var(--border2);
  background: var(--surface2); cursor: pointer;
  font-family: var(--mono); font-size: 10px; color: var(--text2);
  letter-spacing: 0.08em; text-align: center; transition: all 0.15s;
}
.txt-speed-btn:hover { border-color: var(--green); color: var(--green); }

.gen-btn {
  width: 100%; padding: 14px;
  background: var(--blue); color: #fff;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em;
  border: none; cursor: pointer; transition: all 0.15s;
}
.gen-btn:hover { background: #0044cc; }
.gen-btn:disabled { background: var(--border2); cursor: not-allowed; color: var(--text3); }

.right-area {
  flex: 1; overflow-y: auto; padding: 32px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
}

.preview-wrap { position: relative; display: none; }
.preview-canvas {
  display: block; border: 1px solid var(--border);
  max-width: 480px; max-height: 480px;
}

.progress-wrap { width: 100%; max-width: 480px; display: none; flex-direction: column; gap: 8px; }
.progress-label { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.1em; }
.progress-bar-bg { height: 4px; background: var(--border); width: 100%; }
.progress-bar-fill { height: 4px; background: var(--blue); width: 0%; transition: width 0.1s; }

.dl-btn {
  font-family: var(--mono); font-size: 12px; color: var(--green);
  background: none; border: 1px solid var(--green); padding: 12px 32px;
  cursor: pointer; letter-spacing: 0.1em; transition: all 0.15s; display: none;
}
.dl-btn:hover { background: var(--green); color: #fff; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  color: var(--text3); font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
}
.empty-icon { font-size: 48px; opacity: 0.3; }

/* ── Tabs ── */
.tabs {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
  padding: 0 32px;
}
.tab-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  color: var(--text3); background: none; border: none; cursor: pointer;
  padding: 12px 20px; border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── Text mode controls ── */
.text-input-area {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--border2); background: var(--surface2);
  font-family: var(--sans); font-size: 15px; color: var(--text);
  resize: vertical; min-height: 80px; outline: none; transition: border 0.15s;
}
.text-input-area:focus { border-color: var(--blue); }

.color-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0;
}
.color-swatch.active { border-color: var(--text); transform: scale(1.15); }

.font-select {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border2); background: var(--surface2);
  font-family: var(--sans); font-size: 13px; color: var(--text);
  outline: none; cursor: pointer; transition: border 0.15s;
}
.font-select:focus { border-color: var(--blue); }

/* panel sections hidden by tab */
.panel-section { display: flex; flex-direction: column; gap: 20px; }
.panel-section.hidden { display: none; }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">← BACK</a>
      <div class="header-title">GIF MAKER</div>
      <div class="header-badge">TOOL_004</div>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.1em;">ANIMATE · LOCAL · FREE</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="image">IMAGE MODE</button>
    <button class="tab-btn" data-tab="text">TEXT MODE</button>
  </div>

  <div class="main">
    <div class="panel">

      <!-- IMAGE MODE panel -->
      <div class="panel-section" id="panelImage">
        <div>
          <div class="section-label">01 / UPLOAD IMAGE</div>
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept="image/*">
            <div class="upload-icon">🖼️</div>
            <div class="upload-hint">CLICK OR DRAG IMAGE HERE</div>
          </div>
          <img class="upload-preview" id="imgPreview" alt="preview">
        </div>

        <div>
          <div class="section-label">02 / CHOOSE EFFECT</div>
          <div class="effect-grid">
            <button class="effect-btn active" data-effect="shake">SHAKE</button>
            <button class="effect-btn" data-effect="blink">BLINK</button>
            <button class="effect-btn" data-effect="fade">FADE IN/OUT</button>
            <button class="effect-btn" data-effect="zoom">ZOOM PULSE</button>
          </div>
        </div>

        <div>
          <div class="section-label">03 / SPEED</div>
          <div class="speed-row">
            <button class="speed-btn" data-speed="slow">SLOW</button>
            <button class="speed-btn active" data-speed="medium">MED</button>
            <button class="speed-btn" data-speed="fast">FAST</button>
          </div>
        </div>

        <button class="gen-btn" id="genBtn" disabled>GENERATE GIF →</button>
      </div>

      <!-- TEXT MODE panel -->
      <div class="panel-section hidden" id="panelText">
        <div>
          <div class="section-label">01 / ENTER TEXT</div>
          <textarea class="text-input-area" id="textInput" placeholder="输入文字..."></textarea>
        </div>

        <div>
          <div class="section-label">02 / FONT</div>
          <select class="font-select" id="fontSelect">
            <option value="Impact">Impact</option>
            <option value="Syne">Syne</option>
            <option value="Space Mono">Space Mono</option>
            <option value="Georgia">Georgia</option>
            <option value="Arial Black">Arial Black</option>
          </select>
        </div>

        <div>
          <div class="section-label">03 / COLOR</div>
          <div class="color-row" id="colorRow">
            <div class="color-swatch active" data-color="#ffffff" style="background:#ffffff;border-color:#ccc;"></div>
            <div class="color-swatch" data-color="#0a0e1a" style="background:#0a0e1a;"></div>
            <div class="color-swatch" data-color="#0057ff" style="background:#0057ff;"></div>
            <div class="color-swatch" data-color="#ff2d78" style="background:#ff2d78;"></div>
            <div class="color-swatch" data-color="#00c97a" style="background:#00c97a;"></div>
            <div class="color-swatch" data-color="#ffff00" style="background:#ffff00;border-color:#ccc;"></div>
            <div class="color-swatch" data-color="#00ffcc" style="background:#00ffcc;border-color:#ccc;"></div>
          </div>
        </div>

        <div>
          <div class="section-label">04 / TEXT EFFECT</div>
          <div class="effect-grid">
            <button class="txt-effect-btn active" data-txteffect="typewriter">TYPEWRITER</button>
            <button class="txt-effect-btn" data-txteffect="bounce">BOUNCE</button>
            <button class="txt-effect-btn" data-txteffect="glitch">GLITCH</button>
            <button class="txt-effect-btn" data-txteffect="wave">WAVE</button>
          </div>
        </div>

        <div>
          <div class="section-label">05 / SPEED</div>
          <div class="speed-row">
            <button class="txt-speed-btn" data-speed="slow">SLOW</button>
            <button class="txt-speed-btn active" data-speed="medium">MED</button>
            <button class="txt-speed-btn" data-speed="fast">FAST</button>
          </div>
        </div>

        <button class="gen-btn" id="genBtnText" disabled>GENERATE GIF →</button>
      </div>

    </div>

    <div class="right-area" id="rightArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎞️</div>
        <div id="emptyHint">UPLOAD AN IMAGE TO START</div>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <canvas class="preview-canvas" id="previewCanvas"></canvas>
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-label" id="progressLabel">GENERATING... 0%</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      </div>
      <button class="dl-btn" id="dlBtn">↓ DOWNLOAD GIF</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script>
// ── DOM refs ──
const fileInput     = document.getElementById('fileInput');
const uploadZone    = document.getElementById('uploadZone');
const imgPreview    = document.getElementById('imgPreview');
const genBtn        = document.getElementById('genBtn');
const genBtnText    = document.getElementById('genBtnText');
const emptyState    = document.getElementById('emptyState');
const emptyHint     = document.getElementById('emptyHint');
const previewWrap   = document.getElementById('previewWrap');
const previewCanvas = document.getElementById('previewCanvas');
const progressWrap  = document.getElementById('progressWrap');
const progressLabel = document.getElementById('progressLabel');
const progressFill  = document.getElementById('progressFill');
const dlBtn         = document.getElementById('dlBtn');
const textInput     = document.getElementById('textInput');
const fontSelect    = document.getElementById('fontSelect');

// ── State ──
let sourceImage    = null;
let selectedEffect = 'shake';
let selectedSpeed  = 'medium';
let previewRafId   = null;
let previewFrame   = 0;
let currentTab     = 'image';
let selectedColor  = '#ffffff';
let selectedTxtEffect = 'typewriter';
let selectedTxtSpeed  = 'medium';

// ── Speed config ──
const SPEED_CONFIG = {
  slow:   { delay: 80,  frames: 20 },
  medium: { delay: 50,  frames: 16 },
  fast:   { delay: 30,  frames: 12 },
};

const SIZE = 480;

// ── Tab switching ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;

    document.getElementById('panelImage').classList.toggle('hidden', currentTab !== 'image');
    document.getElementById('panelText').classList.toggle('hidden', currentTab !== 'text');

    // reset right area
    if (previewRafId) { cancelAnimationFrame(previewRafId); previewRafId = null; }
    previewWrap.style.display = 'none';
    progressWrap.style.display = 'none';
    dlBtn.style.display = 'none';

    if (currentTab === 'image') {
      emptyHint.textContent = 'UPLOAD AN IMAGE TO START';
      emptyState.style.display = sourceImage ? 'none' : 'flex';
      if (sourceImage) { previewWrap.style.display = 'block'; startPreview(); }
    } else {
      emptyHint.textContent = 'ENTER TEXT TO PREVIEW';
      const hasText = textInput.value.trim();
      emptyState.style.display = hasText ? 'none' : 'flex';
      if (hasText) { previewWrap.style.display = 'block'; startTextPreview(); }
    }
  });
});

// ── Upload (image mode) ──
function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      imgPreview.src = e.target.result;
      imgPreview.style.display = 'block';
      uploadZone.querySelector('.upload-icon').style.display = 'none';
      uploadZone.querySelector('.upload-hint').style.display = 'none';
      emptyState.style.display = 'none';
      previewWrap.style.display = 'block';
      genBtn.disabled = false;
      dlBtn.style.display = 'none';
      startPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

fileInput.addEventListener('change', e => loadImage(e.target.files[0]));
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  loadImage(e.dataTransfer.files[0]);
});

// ── Effect selection (image mode) ──
document.querySelectorAll('.effect-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.effect-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedEffect = btn.dataset.effect;
    if (sourceImage) startPreview();
  });
});

// ── Speed selection (image mode) ──
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSpeed = btn.dataset.speed;
    if (sourceImage) startPreview();
  });
});

// ── Text mode controls ──
document.getElementById('colorRow').querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.getElementById('colorRow').querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    selectedColor = sw.dataset.color;
    if (textInput.value.trim()) startTextPreview();
  });
});

document.querySelectorAll('.txt-effect-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.txt-effect-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTxtEffect = btn.dataset.txteffect;
    if (textInput.value.trim()) startTextPreview();
  });
});

document.querySelectorAll('.txt-speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.txt-speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedTxtSpeed = btn.dataset.speed;
    if (textInput.value.trim()) startTextPreview();
  });
});

textInput.addEventListener('input', () => {
  const hasText = textInput.value.trim();
  genBtnText.disabled = !hasText;
  if (hasText) {
    emptyState.style.display = 'none';
    previewWrap.style.display = 'block';
    startTextPreview();
  } else {
    previewWrap.style.display = 'none';
    emptyState.style.display = 'flex';
    if (previewRafId) { cancelAnimationFrame(previewRafId); previewRafId = null; }
  }
});

fontSelect.addEventListener('change', () => {
  if (textInput.value.trim()) startTextPreview();
});

// ── Canvas preview — image mode ──
function startPreview() {
  if (previewRafId) cancelAnimationFrame(previewRafId);
  previewCanvas.width = SIZE;
  previewCanvas.height = SIZE;
  previewFrame = 0;
  const { frames, delay } = SPEED_CONFIG[selectedSpeed];
  let lastTime = 0;

  function loop(ts) {
    if (ts - lastTime >= delay) {
      renderFrame(previewCanvas, sourceImage, selectedEffect, previewFrame, frames);
      previewFrame = (previewFrame + 1) % frames;
      lastTime = ts;
    }
    previewRafId = requestAnimationFrame(loop);
  }
  previewRafId = requestAnimationFrame(loop);
}

// ── Canvas preview — text mode ──
function startTextPreview() {
  if (previewRafId) cancelAnimationFrame(previewRafId);
  previewCanvas.width = SIZE;
  previewCanvas.height = SIZE;
  previewFrame = 0;
  const { frames, delay } = SPEED_CONFIG[selectedTxtSpeed];
  let lastTime = 0;

  function loop(ts) {
    if (ts - lastTime >= delay) {
      renderTextFrame(previewCanvas, textInput.value.trim(), selectedTxtEffect, previewFrame, frames, selectedColor, fontSelect.value);
      previewFrame = (previewFrame + 1) % frames;
      lastTime = ts;
    }
    previewRafId = requestAnimationFrame(loop);
  }
  previewRafId = requestAnimationFrame(loop);
}

// ── Image frame renderer ──
function renderFrame(canvas, img, effect, frame, totalFrames) {
  const ctx = canvas.getContext('2d');
  const t = frame / totalFrames;

  ctx.clearRect(0, 0, SIZE, SIZE);
  ctx.save();

  function drawImg(dx, dy, dw, dh) {
    const scale = Math.max(dw / img.width, dh / img.height);
    const sw = img.width * scale, sh = img.height * scale;
    const sx = dx + (dw - sw) / 2, sy = dy + (dh - sh) / 2;
    ctx.drawImage(img, sx, sy, sw, sh);
  }

  if (effect === 'shake') {
    const amp = 8;
    const dx = Math.round(Math.sin(t * Math.PI * 4) * amp);
    const dy = Math.round(Math.cos(t * Math.PI * 3) * amp * 0.6);
    ctx.translate(dx, dy);
    drawImg(0, 0, SIZE, SIZE);
  } else if (effect === 'blink') {
    const visible = frame % 4 < 2;
    drawImg(0, 0, SIZE, SIZE);
    if (!visible) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(0, 0, SIZE, SIZE);
    }
  } else if (effect === 'fade') {
    const alpha = t < 0.5 ? t * 2 : (1 - t) * 2;
    ctx.globalAlpha = Math.max(0.05, alpha);
    drawImg(0, 0, SIZE, SIZE);
  } else if (effect === 'zoom') {
    const scale = 1 + Math.sin(t * Math.PI) * 0.12;
    ctx.translate(SIZE / 2, SIZE / 2);
    ctx.scale(scale, scale);
    ctx.translate(-SIZE / 2, -SIZE / 2);
    drawImg(0, 0, SIZE, SIZE);
  }

  ctx.restore();
}

// ── Text frame renderer ──
function renderTextFrame(canvas, text, effect, frame, totalFrames, color, fontName) {
  const ctx = canvas.getContext('2d');
  const t = frame / totalFrames;

  // black background
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, SIZE, SIZE);

  const fontSize = Math.round(SIZE * 0.1);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (effect === 'typewriter') {
    // reveal chars one by one across the loop
    const chars = Math.max(1, Math.round(t * text.length));
    const partial = text.slice(0, chars);
    ctx.font = `bold ${fontSize}px "${fontName}", sans-serif`;
    ctx.fillStyle = color;
    ctx.fillText(partial, SIZE / 2, SIZE / 2);
    // blinking cursor
    if (frame % 6 < 3) {
      ctx.fillStyle = color;
      const w = ctx.measureText(partial).width;
      ctx.fillRect(SIZE / 2 + w / 2 + 4, SIZE / 2 - fontSize / 2, 3, fontSize);
    }

  } else if (effect === 'bounce') {
    // each char bounces with offset phase
    const chars = text.split('');
    const totalW = chars.reduce((acc, ch) => {
      ctx.font = `bold ${fontSize}px "${fontName}", sans-serif`;
      return acc + ctx.measureText(ch).width;
    }, 0);
    let x = SIZE / 2 - totalW / 2;
    chars.forEach((ch, i) => {
      ctx.font = `bold ${fontSize}px "${fontName}", sans-serif`;
      const phase = (t + i / chars.length) % 1;
      const dy = -Math.abs(Math.sin(phase * Math.PI)) * 30;
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(ch, x, SIZE / 2 + dy);
      x += ctx.measureText(ch).width;
    });

  } else if (effect === 'glitch') {
    ctx.font = `bold ${fontSize}px "${fontName}", sans-serif`;
    // base text
    ctx.fillStyle = color;
    ctx.fillText(text, SIZE / 2, SIZE / 2);
    // glitch slices on odd frames
    if (frame % 3 === 0) {
      const offset = (Math.random() - 0.5) * 20;
      ctx.fillStyle = '#ff2d78';
      ctx.globalAlpha = 0.7;
      ctx.fillText(text, SIZE / 2 + offset, SIZE / 2 - 4);
      ctx.fillStyle = '#00ffcc';
      ctx.fillText(text, SIZE / 2 - offset, SIZE / 2 + 4);
      ctx.globalAlpha = 1;
    }

  } else if (effect === 'wave') {
    const chars = text.split('');
    const totalW = chars.reduce((acc, ch) => {
      ctx.font = `bold ${fontSize}px "${fontName}", sans-serif`;
      return acc + ctx.measureText(ch).width;
    }, 0);
    let x = SIZE / 2 - totalW / 2;
    chars.forEach((ch, i) => {
      ctx.font = `bold ${fontSize}px "${fontName}", sans-serif`;
      const dy = Math.sin((t * Math.PI * 2) + (i / chars.length) * Math.PI * 2) * 20;
      ctx.fillStyle = color;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(ch, x, SIZE / 2 + dy);
      x += ctx.measureText(ch).width;
    });
  }
}

// ── Generate GIF — image mode ──
function generateGif() {
  if (!sourceImage) return;
  const { delay, frames } = SPEED_CONFIG[selectedSpeed];

  genBtn.disabled = true;
  progressWrap.style.display = 'flex';
  progressFill.style.width = '0%';
  progressLabel.textContent = 'GENERATING... 0%';
  dlBtn.style.display = 'none';

  const offCanvas = document.createElement('canvas');
  offCanvas.width = SIZE;
  offCanvas.height = SIZE;

  const gif = new GIF({ workers: 0, quality: 10, width: SIZE, height: SIZE });

  for (let i = 0; i < frames; i++) {
    renderFrame(offCanvas, sourceImage, selectedEffect, i, frames);
    gif.addFrame(offCanvas, { copy: true, delay });
  }

  gif.on('progress', p => {
    const pct = Math.round(p * 100);
    progressFill.style.width = pct + '%';
    progressLabel.textContent = `GENERATING... ${pct}%`;
  });

  gif.on('finished', blob => {
    progressWrap.style.display = 'none';
    genBtn.disabled = false;
    const url = URL.createObjectURL(blob);
    dlBtn.style.display = 'inline-block';
    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = url;
      a.download = `gif-${selectedEffect}-${selectedSpeed}.gif`;
      a.click();
    };
  });

  gif.render();
}

// ── Generate GIF — text mode ──
function generateTextGif() {
  const text = textInput.value.trim();
  if (!text) return;
  const { delay, frames } = SPEED_CONFIG[selectedTxtSpeed];

  genBtnText.disabled = true;
  progressWrap.style.display = 'flex';
  progressFill.style.width = '0%';
  progressLabel.textContent = 'GENERATING... 0%';
  dlBtn.style.display = 'none';

  const offCanvas = document.createElement('canvas');
  offCanvas.width = SIZE;
  offCanvas.height = SIZE;

  const gif = new GIF({ workers: 0, quality: 10, width: SIZE, height: SIZE });

  for (let i = 0; i < frames; i++) {
    renderTextFrame(offCanvas, text, selectedTxtEffect, i, frames, selectedColor, fontSelect.value);
    gif.addFrame(offCanvas, { copy: true, delay });
  }

  gif.on('progress', p => {
    const pct = Math.round(p * 100);
    progressFill.style.width = pct + '%';
    progressLabel.textContent = `GENERATING... ${pct}%`;
  });

  gif.on('finished', blob => {
    progressWrap.style.display = 'none';
    genBtnText.disabled = false;
    const url = URL.createObjectURL(blob);
    dlBtn.style.display = 'inline-block';
    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = url;
      a.download = `gif-text-${selectedTxtEffect}-${selectedTxtSpeed}.gif`;
      a.click();
    };
  });

  gif.render();
}

genBtn.addEventListener('click', generateGif);
genBtnText.addEventListener('click', generateTextGif);
