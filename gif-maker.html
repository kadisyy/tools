<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF Maker — TOOLBOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f7f9ff;
  --border: #dde4f5;
  --border2: #c8d4f0;
  --blue: #0057ff;
  --blue2: #00aaff;
  --pink: #ff2d78;
  --green: #00c97a;
  --purple: #7c3aed;
  --text: #0a0e1a;
  --text2: #4a5578;
  --text3: #8896b8;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,87,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,87,255,0.05) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}

.app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 1px solid var(--border);
  background: rgba(240,244,255,0.85); backdrop-filter: blur(12px);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.back-btn {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  text-decoration: none; letter-spacing: 0.1em;
  border: 1px solid var(--border2); padding: 6px 14px;
  background: var(--surface); transition: all 0.15s;
}
.back-btn:hover { color: var(--blue); border-color: var(--blue); }
.header-title { font-family: var(--sans); font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
.header-badge {
  font-family: var(--mono); font-size: 10px; color: var(--green);
  border: 1px solid var(--green); padding: 3px 10px; letter-spacing: 0.1em;
}

.main { display: flex; flex: 1; overflow: hidden; }

.panel {
  width: 320px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow-y: auto; padding: 24px;
  display: flex; flex-direction: column; gap: 20px;
}
.section-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.15em; margin-bottom: 10px;
}

.upload-zone {
  border: 2px dashed var(--border2); padding: 32px 16px;
  text-align: center; cursor: pointer; transition: all 0.2s;
  background: var(--surface2); position: relative;
}
.upload-zone:hover, .upload-zone.drag-over { border-color: var(--blue); background: rgba(0,87,255,0.04); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-hint { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.upload-preview { width: 100%; aspect-ratio: 1; object-fit: cover; display: none; margin-top: 12px; }

.text-input-area {
  width: 100%; padding: 12px 14px;
  border: 1px solid var(--border2); background: var(--surface2);
  font-family: var(--sans); font-size: 14px; color: var(--text);
  resize: vertical; min-height: 72px; outline: none; transition: border 0.15s;
}
.text-input-area:focus { border-color: var(--blue); }

.hint-text {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.05em; line-height: 1.6; margin-top: 6px;
}

.speed-row { display: flex; gap: 8px; }
.speed-btn {
  flex: 1; padding: 8px 4px; border: 1px solid var(--border2);
  background: var(--surface2); cursor: pointer;
  font-family: var(--mono); font-size: 10px; color: var(--text2);
  letter-spacing: 0.08em; text-align: center; transition: all 0.15s;
}
.speed-btn:hover { border-color: var(--green); color: var(--green); }
.speed-btn.active { border-color: var(--green); background: var(--green); color: #fff; }

.gen-btn {
  width: 100%; padding: 14px;
  background: var(--blue); color: #fff;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em;
  border: none; cursor: pointer; transition: all 0.15s;
}
.gen-btn:hover:not(:disabled) { background: #0044cc; }
.gen-btn:disabled { background: var(--border2); cursor: not-allowed; color: var(--text3); }

.right-area {
  flex: 1; overflow-y: auto; padding: 32px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
}

.preview-wrap { position: relative; display: none; }
.preview-canvas {
  display: block; border: 1px solid var(--border);
  max-width: 480px; max-height: 480px;
}

.dl-btn {
  font-family: var(--mono); font-size: 12px; color: var(--green);
  background: none; border: 1px solid var(--green); padding: 12px 32px;
  cursor: pointer; letter-spacing: 0.1em; transition: all 0.15s; display: none;
}
.dl-btn:hover { background: var(--green); color: #fff; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  color: var(--text3); font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
}
.empty-icon { font-size: 48px; opacity: 0.3; }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <a href="index.html" class="back-btn">← BACK</a>
      <div class="header-title">GIF MAKER</div>
      <div class="header-badge">TOOL_004</div>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.1em;">ANIMATE · LOCAL · FREE</div>
  </header>

  <div class="main">
    <div class="panel">

      <div>
        <div class="section-label">01 / UPLOAD IMAGE</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept="image/*">
          <div class="upload-icon">🖼️</div>
          <div class="upload-hint">CLICK OR DRAG IMAGE HERE</div>
        </div>
        <img class="upload-preview" id="imgPreview" alt="preview">
      </div>

      <div>
        <div class="section-label">02 / DESCRIBE THE SCENE</div>
        <textarea class="text-input-area" id="textInput" placeholder="描述图片的状态，例如：狂吠、开心跳跃、慵懒睡觉、愤怒咆哮、游泳飘动..."></textarea>
        <div class="hint-text">狂吠/愤怒 → 抖动 · 跳跃/开心 → 弹跳 · 心跳/惊讶 → 缩放 · 游泳/飘动 → 波浪 · 睡觉/困 → 闪烁 · 消失/平静 → 渐变 · 赛博/故障 → 故障</div>
      </div>

      <div>
        <div class="section-label">03 / SPEED</div>
        <div class="speed-row">
          <button class="speed-btn" data-speed="slow">SLOW</button>
          <button class="speed-btn active" data-speed="medium">MED</button>
          <button class="speed-btn" data-speed="fast">FAST</button>
        </div>
      </div>

      <button class="gen-btn" id="genBtn" disabled>GENERATE GIF →</button>
    </div>

    <div class="right-area">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🎞️</div>
        <div>UPLOAD AN IMAGE TO START</div>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <canvas class="preview-canvas" id="previewCanvas"></canvas>
        <div id="effectTag" style="font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.1em;margin-top:8px;text-align:center;"></div>
      </div>
      <button class="dl-btn" id="dlBtn">↓ DOWNLOAD GIF</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script>
const fileInput     = document.getElementById('fileInput');
const uploadZone    = document.getElementById('uploadZone');
const imgPreview    = document.getElementById('imgPreview');
const genBtn        = document.getElementById('genBtn');
const emptyState    = document.getElementById('emptyState');
const previewWrap   = document.getElementById('previewWrap');
const previewCanvas = document.getElementById('previewCanvas');
const dlBtn         = document.getElementById('dlBtn');
const textInput     = document.getElementById('textInput');
const effectTag     = document.getElementById('effectTag');

let sourceImage  = null;
let previewRafId = null;
let previewFrame = 0;
let selectedSpeed = 'medium';

const SPEED_CONFIG = {
  slow:   { delay: 80,  frames: 20 },
  medium: { delay: 50,  frames: 16 },
  fast:   { delay: 30,  frames: 12 },
};

const SIZE = 480;

// ── Keyword → effect mapping ──
const EFFECT_KEYWORDS = {
  shake:  ['抖动', '震动', '颤抖', '狂吠', '吠叫', '咆哮', '愤怒', '发抖', '害怕', '紧张', '激动', '兴奋', '狂叫', '嚎叫', '颤', '哆嗦', 'shake', 'shaking', 'vibrate', 'bark', 'rage', 'angry', 'excited', 'tremble', 'nervous'],
  bounce: ['弹跳', '跳动', '跳跃', '蹦跳', '蹦蹦跳跳', '开心', '高兴', '欢快', '活泼', '奔跑', '跑', '跳', '蹦', '玩耍', '嬉戏', 'bounce', 'jump', 'hop', 'happy', 'run', 'play', 'energetic', 'lively'],
  zoom:   ['缩放', '放大', '脉冲', '心跳', '呼吸', '膨胀', '鼓胀', '喘气', '喘息', '惊讶', '震惊', '瞪眼', 'zoom', 'pulse', 'scale', 'breathe', 'heartbeat', 'surprised', 'shocked'],
  blink:  ['闪烁', '闪光', '闪', '眨眼', '睡觉', '困', '打盹', '昏昏欲睡', '迷离', '发光', '亮', 'blink', 'flash', 'flicker', 'wink', 'sleepy', 'tired', 'glow'],
  fade:   ['渐入', '渐出', '淡入', '淡出', '消失', '出现', '若隐若现', '朦胧', '梦幻', '安静', '平静', '沉睡', 'fade', 'fading', 'appear', 'disappear', 'dreamy', 'calm', 'peaceful'],
  wave:   ['波浪', '波动', '摇摆', '摇晃', '飘动', '飘', '游泳', '游', '漂浮', '悠闲', '慵懒', '懒洋洋', '晃', 'wave', 'ripple', 'swing', 'sway', 'float', 'swim', 'lazy', 'gentle'],
  glitch: ['故障', '毛刺', '错位', '赛博', '科技', '黑客', '数字', '像素', '失真', '混乱', '崩溃', 'glitch', 'distort', 'corrupt', 'cyber', 'hack', 'digital', 'pixel', 'chaos'],
};

function detectEffect(text) {
  const lower = text.toLowerCase();
  for (const [effect, keywords] of Object.entries(EFFECT_KEYWORDS)) {
    if (keywords.some(kw => lower.includes(kw))) return effect;
  }
  return 'shake'; // default
}

// ── Upload ──
function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      imgPreview.src = e.target.result;
      imgPreview.style.display = 'block';
      uploadZone.querySelector('.upload-icon').style.display = 'none';
      uploadZone.querySelector('.upload-hint').style.display = 'none';
      emptyState.style.display = 'none';
      previewWrap.style.display = 'block';
      dlBtn.style.display = 'none';
      genBtn.disabled = false;
      startPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

fileInput.addEventListener('change', e => loadImage(e.target.files[0]));
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  loadImage(e.dataTransfer.files[0]);
});

// ── Speed ──
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSpeed = btn.dataset.speed;
    if (sourceImage) startPreview();
  });
});

// ── Text input → re-preview ──
textInput.addEventListener('input', () => {
  if (sourceImage) startPreview();
});

// ── Canvas preview (RAF) ──
const EFFECT_LABELS = { shake:'SHAKE 抖动', fade:'FADE 渐变', blink:'BLINK 闪烁', zoom:'ZOOM 缩放', bounce:'BOUNCE 弹跳', wave:'WAVE 波浪', glitch:'GLITCH 故障' };

function startPreview() {
  if (previewRafId) cancelAnimationFrame(previewRafId);
  previewCanvas.width = SIZE;
  previewCanvas.height = SIZE;
  previewFrame = 0;
  const effect = detectEffect(textInput.value);
  effectTag.textContent = `EFFECT → ${EFFECT_LABELS[effect]}`;
  const { frames, delay } = SPEED_CONFIG[selectedSpeed];
  let lastTime = 0;

  function loop(ts) {
    if (ts - lastTime >= delay) {
      renderFrame(previewCanvas, sourceImage, effect, previewFrame, frames, textInput.value.trim());
      previewFrame = (previewFrame + 1) % frames;
      lastTime = ts;
    }
    previewRafId = requestAnimationFrame(loop);
  }
  previewRafId = requestAnimationFrame(loop);
}

// ── Frame renderer ──
function renderFrame(canvas, img, effect, frame, totalFrames, overlayText) {
  const ctx = canvas.getContext('2d');
  const t = frame / totalFrames;

  ctx.clearRect(0, 0, SIZE, SIZE);
  ctx.save();

  function drawImg(dx, dy, dw, dh) {
    const scale = Math.max(dw / img.width, dh / img.height);
    const sw = img.width * scale, sh = img.height * scale;
    const sx = dx + (dw - sw) / 2, sy = dy + (dh - sh) / 2;
    ctx.drawImage(img, sx, sy, sw, sh);
  }

  if (effect === 'shake') {
    const amp = 8;
    const dx = Math.round(Math.sin(t * Math.PI * 4) * amp);
    const dy = Math.round(Math.cos(t * Math.PI * 3) * amp * 0.6);
    ctx.translate(dx, dy);
    drawImg(0, 0, SIZE, SIZE);
  } else if (effect === 'blink') {
    drawImg(0, 0, SIZE, SIZE);
    if (frame % 4 >= 2) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(0, 0, SIZE, SIZE);
    }
  } else if (effect === 'fade') {
    const alpha = t < 0.5 ? t * 2 : (1 - t) * 2;
    ctx.globalAlpha = Math.max(0.05, alpha);
    drawImg(0, 0, SIZE, SIZE);
  } else if (effect === 'zoom') {
    const scale = 1 + Math.sin(t * Math.PI) * 0.12;
    ctx.translate(SIZE / 2, SIZE / 2);
    ctx.scale(scale, scale);
    ctx.translate(-SIZE / 2, -SIZE / 2);
    drawImg(0, 0, SIZE, SIZE);
  } else if (effect === 'bounce') {
    const dy = -Math.abs(Math.sin(t * Math.PI)) * 20;
    ctx.translate(0, dy);
    drawImg(0, 0, SIZE, SIZE);
  } else if (effect === 'wave') {
    // horizontal wave distortion via scanlines
    drawImg(0, 0, SIZE, SIZE);
    ctx.restore(); ctx.save();
    // overlay wave shimmer
    const grad = ctx.createLinearGradient(0, 0, 0, SIZE);
    const shimmerY = (t * SIZE * 1.5) % (SIZE * 1.5) - SIZE * 0.25;
    grad.addColorStop(0, 'rgba(255,255,255,0)');
    grad.addColorStop(Math.max(0, Math.min(1, (shimmerY) / SIZE)), 'rgba(255,255,255,0)');
    grad.addColorStop(Math.max(0, Math.min(1, (shimmerY + 40) / SIZE)), 'rgba(255,255,255,0.18)');
    grad.addColorStop(Math.max(0, Math.min(1, (shimmerY + 80) / SIZE)), 'rgba(255,255,255,0)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, SIZE, SIZE);
  } else if (effect === 'glitch') {
    drawImg(0, 0, SIZE, SIZE);
    if (frame % 3 === 0) {
      // RGB split
      ctx.globalCompositeOperation = 'screen';
      ctx.globalAlpha = 0.5;
      const off = Math.round((Math.random() - 0.5) * 16);
      ctx.fillStyle = '#ff0000';
      ctx.drawImage(canvas, off, 0);
      ctx.fillStyle = '#00ffff';
      ctx.drawImage(canvas, -off, 0);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      // horizontal slice
      const sliceY = Math.round(Math.random() * SIZE);
      const sliceH = Math.round(Math.random() * 20 + 4);
      const sliceOff = Math.round((Math.random() - 0.5) * 30);
      ctx.drawImage(canvas, 0, sliceY, SIZE, sliceH, sliceOff, sliceY, SIZE, sliceH);
    }
  }

  ctx.restore();

  // ── Overlay text on image ──
  if (overlayText) {
    const fontSize = Math.round(SIZE * 0.085);
    ctx.font = `bold ${fontSize}px Impact, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    // semi-transparent bar
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, SIZE - fontSize * 1.6, SIZE, fontSize * 1.6);
    // stroke + fill
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.lineJoin = 'round';
    ctx.strokeText(overlayText, SIZE / 2, SIZE - fontSize * 0.3);
    ctx.fillStyle = '#fff';
    ctx.fillText(overlayText, SIZE / 2, SIZE - fontSize * 0.3);
  }
}

// ── Generate GIF ──
genBtn.addEventListener('click', () => {
  if (!sourceImage) return;
  const effect = detectEffect(textInput.value);
  const { delay, frames } = SPEED_CONFIG[selectedSpeed];

  genBtn.disabled = true;
  genBtn.textContent = 'GENERATING...';
  dlBtn.style.display = 'none';

  const offCanvas = document.createElement('canvas');
  offCanvas.width = SIZE;
  offCanvas.height = SIZE;

  const gif = new GIF({ workers: 0, quality: 10, width: SIZE, height: SIZE });

  for (let i = 0; i < frames; i++) {
    renderFrame(offCanvas, sourceImage, effect, i, frames, textInput.value.trim());
    gif.addFrame(offCanvas, { copy: true, delay });
  }

  gif.on('finished', blob => {
    genBtn.disabled = false;
    genBtn.textContent = 'GENERATE GIF →';
    const url = URL.createObjectURL(blob);
    dlBtn.style.display = 'inline-block';
    dlBtn.onclick = () => {
      const a = document.createElement('a');
      a.href = url;
      a.download = `gif-${effect}-${selectedSpeed}.gif`;
      a.click();
    };
  });

  gif.render();
});
</script>
</body>
</html>
