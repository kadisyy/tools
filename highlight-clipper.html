<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>燃点剪辑 · TOOLBOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f7f9ff;
  --border: #dde4f5;
  --border2: #c8d4f0;
  --blue: #0057ff;
  --blue2: #00aaff;
  --pink: #ff2d78;
  --green: #00c97a;
  --purple: #7c3aed;
  --text: #0a0e1a;
  --text2: #4a5578;
  --text3: #8896b8;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,87,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,87,255,0.05) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 50% 40% at 10% 10%, rgba(124,58,237,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 90% 80%, rgba(255,45,120,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.wrapper {
  position: relative; z-index: 1;
  min-height: 100vh; display: flex; flex-direction: column;
  max-width: 860px; margin: 0 auto; padding: 0 44px 72px;
}

header { padding: 52px 0 0; margin-bottom: 48px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.back-link {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  text-decoration: none; letter-spacing: 0.1em;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--purple); }
.build {
  font-family: var(--mono); font-size: 10px; color: var(--purple);
  border: 1px solid rgba(124,58,237,0.3); padding: 4px 12px; letter-spacing: 0.1em;
  background: rgba(124,58,237,0.05);
}
.page-title {
  font-family: var(--sans); font-size: clamp(32px, 5vw, 52px);
  font-weight: 800; letter-spacing: -0.02em; line-height: 1.1;
  margin-bottom: 12px;
}
.page-desc { font-size: 15px; color: var(--text2); line-height: 1.6; }

.drop-zone {
  border: 2px dashed var(--border2); border-radius: 8px;
  padding: 64px 32px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.drop-zone.drag-over { border-color: var(--pink); background: rgba(255,45,120,0.04); }
.drop-zone input[type=file] { display: none; }
.drop-label { font-family: var(--mono); font-size: 13px; color: var(--text3); letter-spacing: 0.1em; }

#status { margin-top: 32px; font-family: var(--mono); font-size: 12px; color: var(--text3); min-height: 20px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--purple)); width: 0%; transition: width 0.3s; }

#clips { margin-top: 40px; display: flex; flex-direction: column; gap: 24px; }
.clip-card {
  background: var(--surface); border: 1.5px solid var(--border);
  padding: 24px; border-radius: 4px;
}
.clip-card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.clip-num { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.15em; }
.clip-time { font-family: var(--mono); font-size: 13px; color: var(--text); }
.clip-score { font-family: var(--mono); font-size: 11px; color: var(--pink); margin-left: auto; }
.clip-subtitle-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 8px; }
.clip-subtitle-input {
  width: 100%; min-height: 72px; resize: vertical;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 12px;
  padding: 10px 12px; border-radius: 2px; line-height: 1.6;
}
.clip-actions { display: flex; gap: 12px; margin-top: 16px; }
.btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  padding: 8px 20px; border: 1.5px solid var(--border2);
  background: var(--surface); color: var(--text2); cursor: pointer;
  transition: border-color 0.2s, color 0.2s; border-radius: 2px;
}
.btn:hover { border-color: var(--pink); color: var(--pink); }
.btn-primary { border-color: var(--pink); color: var(--pink); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.clip-progress { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 8px; min-height: 16px; }

footer {
  margin-top: auto; padding-top: 48px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
}
.footer-txt { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.12em; }
.footer-dots { display: flex; gap: 6px; }
.footer-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-top">
      <a href="index.html" class="back-link">← TOOLBOX</a>
      <div class="build">BUILD_006</div>
    </div>
    <h1 class="page-title">燃点剪辑</h1>
    <p class="page-desc">上传长视频，自动检测高爆点，生成多个短视频片段，支持字幕编辑后重新渲染下载。</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="video/*">
    <div class="drop-label">拖拽视频文件到此处，或点击选择<br><span style="color:var(--text3);font-size:11px">支持 MP4 / MOV / MKV / AVI / WEBM</span></div>
  </div>

  <div id="status"></div>
  <div class="progress-bar" id="progressBar" style="display:none"><div class="progress-fill" id="progressFill"></div></div>

  <div id="clips"></div>

  <footer>
    <div class="footer-txt">© 2026 TOOLBOX · ALL RIGHTS RESERVED</div>
    <div class="footer-dots"><span></span><span></span><span></span></div>
  </footer>
</div>
<script>
// JS goes here in later tasks
</script>
</body>
</html>
