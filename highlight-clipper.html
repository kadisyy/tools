<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>燃点剪辑 · TOOLBOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f7f9ff;
  --border: #dde4f5;
  --border2: #c8d4f0;
  --blue: #0057ff;
  --blue2: #00aaff;
  --pink: #ff2d78;
  --green: #00c97a;
  --purple: #7c3aed;
  --text: #0a0e1a;
  --text2: #4a5578;
  --text3: #8896b8;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,87,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,87,255,0.05) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 50% 40% at 10% 10%, rgba(124,58,237,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 90% 80%, rgba(255,45,120,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.wrapper {
  position: relative; z-index: 1;
  min-height: 100vh; display: flex; flex-direction: column;
  max-width: 860px; margin: 0 auto; padding: 0 44px 72px;
}

header { padding: 52px 0 0; margin-bottom: 48px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.back-link {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  text-decoration: none; letter-spacing: 0.1em;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--purple); }
.tool-badge {
  font-family: var(--mono); font-size: 10px; color: var(--purple);
  border: 1px solid rgba(124,58,237,0.3); padding: 4px 12px; letter-spacing: 0.1em;
  background: rgba(124,58,237,0.05);
}
.page-title {
  font-family: var(--sans); font-size: clamp(32px, 5vw, 52px);
  font-weight: 800; letter-spacing: -0.02em; line-height: 1.1;
  margin-bottom: 12px;
}
.page-desc { font-size: 15px; color: var(--text2); line-height: 1.6; }

.drop-zone {
  border: 2px dashed var(--border2); border-radius: 2px;
  padding: 64px 32px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: var(--surface); position: relative;
}
.drop-zone:hover { border-color: var(--border2); }
.drop-zone.drag-over { border-color: var(--pink); background: rgba(255,45,120,0.04); }
.drop-zone input[type=file] { display: none; }
.drop-label { font-family: var(--mono); font-size: 13px; color: var(--text3); letter-spacing: 0.1em; }

#status { margin-top: 32px; font-family: var(--mono); font-size: 12px; color: var(--text3); min-height: 20px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--purple)); width: 0%; transition: width 0.3s; }

#clips { margin-top: 40px; display: flex; flex-direction: column; gap: 24px; }
.clip-card {
  background: var(--surface); border: 1.5px solid var(--border);
  padding: 24px; border-radius: 4px;
}
.clip-card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.clip-num { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.15em; }
.clip-time { font-family: var(--mono); font-size: 13px; color: var(--text); }
.clip-score { font-family: var(--mono); font-size: 11px; color: var(--pink); margin-left: auto; }
.clip-subtitle-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 8px; }
.clip-subtitle-input {
  width: 100%; min-height: 72px; resize: vertical;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 12px;
  padding: 10px 12px; border-radius: 2px; line-height: 1.6;
}
.clip-actions { display: flex; gap: 12px; margin-top: 16px; }
.btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  padding: 8px 20px; border: 1.5px solid var(--border2);
  background: var(--surface); color: var(--text2); cursor: pointer;
  transition: border-color 0.2s, color 0.2s; border-radius: 2px;
}
.btn:hover { border-color: var(--pink); color: var(--pink); }
.btn-primary { border-color: var(--pink); color: var(--pink); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.clip-progress { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 8px; min-height: 16px; }

footer {
  margin-top: auto; padding-top: 48px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
}
.footer-txt { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.12em; }
.footer-dots { display: flex; gap: 6px; }
.footer-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-top">
      <a href="index.html" class="back-link">← TOOLBOX</a>
      <span class="tool-badge">TOOL_006</span>
    </div>
    <h1 class="page-title">燃点剪辑</h1>
    <p class="page-desc">上传长视频，自动检测高爆点，生成多个短视频片段，支持字幕编辑后重新渲染下载。</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="video/*">
    <div class="drop-label">拖拽视频文件到此处，或点击选择<br><span style="color:var(--text3);font-size:11px">支持 MP4 / MOV / MKV / AVI / WEBM</span></div>
  </div>

  <div id="status"></div>
  <div class="progress-bar" id="progressBar" style="display:none"><div class="progress-fill" id="progressFill"></div></div>

  <div id="clips"></div>

  <footer>
    <div class="footer-txt">© 2026 TOOLBOX · ALL RIGHTS RESERVED</div>
    <div class="footer-dots"><span></span><span></span><span></span></div>
  </footer>
</div>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script>
const fileInput = document.getElementById('fileInput');
const statusEl = document.getElementById('status');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const clipsEl = document.getElementById('clips');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) handleFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function setStatus(msg, pct) {
  statusEl.textContent = msg;
  if (pct !== undefined) {
    progressBar.style.display = 'block';
    progressFill.style.width = pct + '%';
  }
}

async function handleFile(file) {
  clipsEl.innerHTML = '';
  try {
    setStatus('正在解码音频...', 5);
    const peaks = await analyzeAudio(file);
    setStatus('音频分析完成，正在分析视频帧...', 40);
    const shotChanges = await analyzeFrames(file);
    setStatus('合并分析结果...', 75);
    const clips = mergeScores(peaks, shotChanges);
    setStatus(`检测到 ${clips.length} 个燃点片段，开始生成...`, 80);
    await generateClips(file, clips);
    setStatus('全部完成', 100);
  } catch (err) {
    setStatus('错误: ' + err.message);
    progressBar.style.display = 'none';
  }
}

async function analyzeAudio(file) {
  const arrayBuffer = await file.arrayBuffer();
  const audioCtx = new AudioContext();
  try {
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const data = audioBuffer.getChannelData(0);
    const sampleRate = audioBuffer.sampleRate;
    const windowSize = Math.floor(sampleRate * 1.0);
    const stepSize = Math.floor(sampleRate * 0.1);
    const energies = [];

    for (let i = 0; i + windowSize < data.length; i += stepSize) {
      let sum = 0;
      for (let j = i; j < i + windowSize; j++) sum += data[j] * data[j];
      energies.push({ t: i / sampleRate, rms: Math.sqrt(sum / windowSize) });
    }

    if (energies.length === 0) return [];

    const smoothed = energies.map((e, i) => {
      const w = 5;
      const slice = energies.slice(Math.max(0, i-w), i+w+1);
      return { t: e.t, rms: slice.reduce((s,x) => s+x.rms, 0) / slice.length };
    });

    const vals = smoothed.map(e => e.rms);
    const mean = vals.reduce((a,b) => a+b, 0) / vals.length;
    const std = Math.sqrt(vals.map(v => (v-mean)**2).reduce((a,b) => a+b, 0) / vals.length);
    const threshold = mean + 1.5 * std;

    const peaks = [];
    for (let i = 1; i < smoothed.length - 1; i++) {
      if (smoothed[i].rms > threshold &&
          smoothed[i].rms >= smoothed[i-1].rms &&
          smoothed[i].rms >= smoothed[i+1].rms) {
        peaks.push({ t: smoothed[i].t, score: smoothed[i].rms / (mean + std) });
      }
    }
    return peaks;
  } finally {
    await audioCtx.close();
  }
}

async function analyzeFrames(file) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const video = document.createElement('video');
    video.src = url; video.muted = true; video.preload = 'auto';
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const results = [];
    let prevData = null;
    let duration = 0;

    video.addEventListener('loadedmetadata', () => {
      duration = video.duration;
      canvas.width = 160; canvas.height = 90;
      seekNext(0);
    });

    video.addEventListener('error', () => { URL.revokeObjectURL(url); resolve([]); });

    function seekNext(t) {
      if (t > duration) {
        URL.revokeObjectURL(url);
        resolve(results);
        return;
      }
      video.currentTime = t;
    }

    video.addEventListener('seeked', () => {
      ctx.drawImage(video, 0, 0, 160, 90);
      const imgData = ctx.getImageData(0, 0, 160, 90).data;
      if (prevData) {
        let diff = 0;
        for (let i = 0; i < imgData.length; i += 4) {
          diff += Math.abs(imgData[i] - prevData[i]) +
                  Math.abs(imgData[i+1] - prevData[i+1]) +
                  Math.abs(imgData[i+2] - prevData[i+2]);
        }
        diff /= (160 * 90 * 3 * 255);
        results.push({ t: video.currentTime, diff });
      }
      prevData = new Uint8ClampedArray(imgData);
      seekNext(video.currentTime + 1);
    });

    video.load();
  });
}

function mergeScores(audioPeaks, frameDiffs) {
  const buckets = {};

  for (const p of audioPeaks) {
    const t = Math.floor(p.t);
    buckets[t] = (buckets[t] || 0) + p.score * 0.6;
  }

  const maxDiff = frameDiffs.reduce((m, f) => Math.max(m, f.diff), 0.001);
  for (const f of frameDiffs) {
    const t = Math.floor(f.t);
    buckets[t] = (buckets[t] || 0) + (f.diff / maxDiff) * 0.4;
  }

  const sorted = Object.entries(buckets)
    .map(([t, s]) => ({ t: Number(t), s }))
    .sort((a, b) => b.s - a.s)
    .slice(0, 20);

  const raw = sorted.map(p => ({
    start: Math.max(0, p.t - 10),
    end: p.t + 10,
    score: p.s
  }));

  raw.sort((a, b) => a.start - b.start);
  const merged = [];
  for (const c of raw) {
    if (merged.length && c.start < merged[merged.length-1].end) {
      merged[merged.length-1].end = Math.max(merged[merged.length-1].end, c.end);
      merged[merged.length-1].score = Math.max(merged[merged.length-1].score, c.score);
    } else {
      merged.push({ ...c });
    }
  }

  return merged.sort((a, b) => b.score - a.score).slice(0, 8);
}

let ffmpegInstance = null;

async function getFFmpeg() {
  if (ffmpegInstance) return ffmpegInstance;
  const { createFFmpeg, fetchFile } = FFmpeg;
  const ff = createFFmpeg({
    corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
    log: false,
  });
  await ff.load();
  ffmpegInstance = { ff, fetchFile };
  return ffmpegInstance;
}

async function generateClips(file, clips) {
  setStatus('加载 ffmpeg...', 82);
  const { ff, fetchFile } = await getFFmpeg();
  ff.FS('writeFile', 'input.mp4', await fetchFile(file));

  for (let i = 0; i < clips.length; i++) {
    const clip = clips[i];
    const card = createClipCard(i, clip);
    clipsEl.appendChild(card);
    await cutClip(ff, fetchFile, clip, i, card);
  }
  try { ff.FS('unlink', 'input.mp4'); } catch {}
}

async function cutClip(ff, fetchFile, clip, idx, card) {
  const outName = `clip_${idx}.mp4`;
  const progressEl = card.querySelector('.clip-progress');
  progressEl.textContent = '剪辑中...';

  ff.setProgress(({ ratio }) => {
    progressEl.textContent = `处理中 ${Math.round(ratio * 100)}%`;
  });

  await ff.run(
    '-ss', String(clip.start),
    '-to', String(clip.end),
    '-i', 'input.mp4',
    '-c', 'copy',
    outName
  );

  ff.setProgress(() => {});

  const data = ff.FS('readFile', outName);
  const blob = new Blob([data.buffer], { type: 'video/mp4' });
  clip._blob = blob;
  clip._outName = outName;

  const dlBtn = card.querySelector('.btn-dl');
  dlBtn.disabled = false;
  dlBtn.onclick = () => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `highlight_${idx+1}.mp4`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 100);
  };

  progressEl.textContent = '完成';

  const renderBtn = card.querySelector('.btn-render');
  const subtitleInput = card.querySelector('.clip-subtitle-input');
  renderBtn.disabled = false;

  renderBtn.addEventListener('click', async () => {
    const text = subtitleInput.value.trim();
    renderBtn.disabled = true;
    const dlBtn = card.querySelector('.btn-dl');
    dlBtn.disabled = true;
    const progressEl = card.querySelector('.clip-progress');
    progressEl.textContent = '烧录字幕中...';

    try {
      const newBlob = await burnSubtitle(ff, clip, idx, text, progressEl);
      clip._blob = newBlob;

      dlBtn.disabled = false;
      dlBtn.onclick = () => {
        const url = URL.createObjectURL(newBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `highlight_${idx+1}_sub.mp4`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 100);
      };
      progressEl.textContent = '字幕已烧录';
    } catch (err) {
      progressEl.textContent = '烧录失败: ' + err.message;
    } finally {
      renderBtn.disabled = false;
    }
  });
}

async function burnSubtitle(ff, clip, idx, text, progressEl) {
  const inName = `clip_${idx}.mp4`;
  const outName = `clip_${idx}_sub.mp4`;

  const escaped = text
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/:/g, '\\:')
    .replace(/%/g, '%%')
    .replace(/\n/g, ' ');

  const filterArgs = escaped
    ? `drawtext=text='${escaped}':fontcolor=white:bordercolor=black:borderw=2:fontsize=24:x=(w-text_w)/2:y=h-60`
    : 'null';

  ff.setProgress(({ ratio }) => {
    progressEl.textContent = `烧录中 ${Math.round(ratio * 100)}%`;
  });

  try { ff.FS('unlink', outName); } catch {}

  await ff.run('-i', inName, '-vf', filterArgs, '-c:a', 'copy', outName);

  ff.setProgress(() => {});

  const data = ff.FS('readFile', outName);
  try { ff.FS('unlink', outName); } catch {}
  return new Blob([data.buffer], { type: 'video/mp4' });
}

function createClipCard(idx, clip) {
  const fmt = s => {
    const m = Math.floor(s/60), sec = Math.floor(s%60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };
  const div = document.createElement('div');
  div.className = 'clip-card';
  div.innerHTML = `
    <div class="clip-card-header">
      <span class="clip-num">CLIP_${String(idx+1).padStart(3,'0')}</span>
      <span class="clip-time">${fmt(clip.start)} – ${fmt(clip.end)}</span>
      <span class="clip-score">SCORE ${clip.score.toFixed(2)}</span>
    </div>
    <div class="clip-subtitle-label">字幕 / SUBTITLE</div>
    <textarea class="clip-subtitle-input" placeholder="输入字幕文字（留空则不添加字幕）"></textarea>
    <div class="clip-actions">
      <button class="btn btn-render" disabled>烧录字幕并重新生成</button>
      <button class="btn btn-primary btn-dl" disabled>下载</button>
    </div>
    <div class="clip-progress"></div>
  `;
  return div;
}
</script>
</body>
</html>
