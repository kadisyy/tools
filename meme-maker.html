<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Maker — TOOLBOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f7f9ff;
  --border: #dde4f5;
  --border2: #c8d4f0;
  --blue: #0057ff;
  --blue2: #00aaff;
  --pink: #ff2d78;
  --green: #00c97a;
  --purple: #7c3aed;
  --text: #0a0e1a;
  --text2: #4a5578;
  --text3: #8896b8;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

/* grid bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,87,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,87,255,0.05) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}

/* ── App shell ── */
.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100vh;
}

/* ── Header ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  height: 56px;
  background: rgba(240,244,255,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-left {
  display: flex; align-items: center; gap: 20px;
}

.back-btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  color: var(--text2); text-decoration: none;
  border: 1px solid var(--border2); padding: 5px 12px;
  background: var(--surface);
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}
.back-btn:hover {
  color: var(--blue); border-color: var(--blue);
  background: rgba(0,87,255,0.04);
}

.header-title {
  font-family: var(--mono); font-size: 14px; font-weight: 700;
  letter-spacing: 0.12em; color: var(--text);
}

.header-badge {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  color: var(--blue); border: 1px solid var(--blue);
  padding: 3px 8px; background: rgba(0,87,255,0.06);
}

.header-right {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  color: var(--text3);
}

/* ── Main ── */
main {
  display: flex; flex-direction: row;
  flex: 1; overflow: hidden;
}

/* ── Left panel ── */
.left-panel {
  width: 320px; flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex; flex-direction: column;
  overflow-y: auto;
  padding: 24px 20px;
  gap: 20px;
}

.section-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
  color: var(--text3); margin-bottom: 10px;
}

/* Upload zone */
.upload-zone {
  border: 2px dashed var(--border2);
  background: var(--surface2);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px;
  padding: 32px 16px;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.upload-zone:hover,
.upload-zone.drag-over {
  border-color: var(--blue);
  background: rgba(0,87,255,0.04);
}
.upload-zone .upload-icon {
  font-size: 32px; line-height: 1;
}
.upload-hint {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  color: var(--text3); text-align: center;
}
#file-input { display: none; }

/* Image preview */
#img-preview {
  display: none;
  width: 100%; aspect-ratio: 1; object-fit: cover;
  border: 1px solid var(--border);
}

/* Text input */
.text-input {
  width: 100%; resize: vertical;
  min-height: 96px;
  padding: 10px 12px;
  font-family: var(--mono); font-size: 12px;
  color: var(--text);
  background: var(--surface2);
  border: 1px solid var(--border2);
  outline: none;
  transition: border-color 0.15s;
  line-height: 1.6;
}
.text-input:focus { border-color: var(--blue); }
.text-input::placeholder { color: var(--text3); }

/* Generate button */
.gen-btn {
  width: 100%;
  padding: 12px;
  font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
  color: #fff;
  background: var(--blue);
  border: none; cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}
.gen-btn:hover:not(:disabled) { background: #0044cc; }
.gen-btn:disabled {
  background: var(--border2); color: var(--text3); cursor: not-allowed;
}

/* ── Right grid area ── */
.right-area {
  flex: 1; overflow-y: auto;
  padding: 24px;
}

.meme-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%;
  min-height: 320px;
  gap: 14px;
  color: var(--text3);
}
.empty-icon { font-size: 48px; line-height: 1; }
.empty-text {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  text-align: center;
}

/* Meme card */
.meme-card {
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: transform 0.18s, box-shadow 0.18s;
}
.meme-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,87,255,0.10);
}
.meme-card img {
  width: 100%; display: block;
}
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
.style-name {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  color: var(--text3);
}
.dl-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  color: var(--blue);
  border: 1px solid var(--blue);
  background: transparent;
  padding: 4px 10px; cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.dl-btn:hover {
  background: var(--blue); color: #fff;
}
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="header-left">
      <a href="index.html" class="back-btn">← BACK</a>
      <span class="header-title">MEME MAKER</span>
      <span class="header-badge">TOOL_003</span>
    </div>
    <div class="header-right">BATCH · LOCAL · FREE</div>
  </header>

  <main>

    <div class="left-panel">

      <div>
        <div class="section-label">01 / UPLOAD IMAGE</div>
        <div class="upload-zone" id="upload-zone">
          <span class="upload-icon">🖼️</span>
          <span class="upload-hint">CLICK OR DRAG IMAGE HERE</span>
        </div>
        <input type="file" id="file-input" accept="image/*">
        <img id="img-preview" alt="Preview">
      </div>

      <div>
        <div class="section-label">02 / ENTER TEXT</div>
        <textarea class="text-input" id="meme-text" placeholder="Enter meme text…"></textarea>
      </div>

      <button class="gen-btn" id="gen-btn" disabled>GENERATE MEMES →</button>

    </div>

    <div class="right-area">
      <div class="meme-grid" id="meme-grid">
        <div class="empty-state" id="empty-state">
          <span class="empty-icon">🎭</span>
          <span class="empty-text">UPLOAD IMAGE + ENTER TEXT TO START</span>
        </div>
      </div>
    </div>

  </main>

</div>

<script>
const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');
const preview = document.getElementById('img-preview');
const memeText = document.getElementById('meme-text');
const genBtn = document.getElementById('gen-btn');
const gridArea = document.getElementById('meme-grid');

let sourceImage = null;

function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadZone.querySelector('.upload-icon').style.display = 'none';
      uploadZone.querySelector('.upload-hint').style.display = 'none';
      checkReady();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadImage(e.target.files[0]));

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  loadImage(e.dataTransfer.files[0]);
});

memeText.addEventListener('input', checkReady);

function checkReady() {
  genBtn.disabled = !(sourceImage && memeText.value.trim());
}

genBtn.addEventListener('click', generateMemes);

const STYLES = [
  { name: 'CLASSIC TOP',    pos: 'top',    font: 'Impact',       color: '#fff',    stroke: '#000',    strokeW: 4, filter: null,       bg: null },
  { name: 'CLASSIC BOTTOM', pos: 'bottom', font: 'Impact',       color: '#fff',    stroke: '#000',    strokeW: 4, filter: null,       bg: null },
  { name: 'SUBTITLE BAR',   pos: 'bottom', font: 'Syne',         color: '#fff',    stroke: null,      strokeW: 0, filter: null,       bg: 'rgba(0,0,0,0.65)' },
  { name: 'TITLE BAR',      pos: 'top',    font: 'Syne',         color: '#fff',    stroke: null,      strokeW: 0, filter: null,       bg: 'rgba(0,0,0,0.65)' },
  { name: 'CENTER BOLD',    pos: 'center', font: 'Impact',       color: '#ff2d78', stroke: '#fff',    strokeW: 3, filter: null,       bg: null },
  { name: 'B&W CLASSIC',    pos: 'bottom', font: 'Impact',       color: '#fff',    stroke: '#000',    strokeW: 4, filter: 'grayscale',bg: null },
  { name: 'VINTAGE',        pos: 'bottom', font: 'Georgia',      color: '#f5e6c8', stroke: '#5a3a1a', strokeW: 2, filter: 'sepia',    bg: null },
  { name: 'NEON',           pos: 'top',    font: 'Impact',       color: '#00ffcc', stroke: '#0057ff', strokeW: 3, filter: null,       bg: null },
  { name: 'HIGH CONTRAST',  pos: 'center', font: 'Impact',       color: '#ffff00', stroke: '#000',    strokeW: 5, filter: 'contrast', bg: null },
  { name: 'MINIMAL',        pos: 'bottom', font: 'Space Mono',   color: '#fff',    stroke: null,      strokeW: 0, filter: null,       bg: 'rgba(0,87,255,0.75)' },
  { name: 'DARK OVERLAY',   pos: 'center', font: 'Syne',         color: '#fff',    stroke: null,      strokeW: 0, filter: 'darken',   bg: 'rgba(0,0,0,0.45)' },
  { name: 'COMIC',          pos: 'top',    font: 'Impact',       color: '#000',    stroke: '#fff',    strokeW: 3, filter: null,       bg: 'rgba(255,255,0,0.85)' },
];

function applyFilter(ctx, filter, w, h) {
  if (!filter) return;
  const imageData = ctx.getImageData(0, 0, w, h);
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    if (filter === 'grayscale') {
      const g = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
      d[i] = d[i+1] = d[i+2] = g;
    } else if (filter === 'sepia') {
      const r = d[i], g = d[i+1], b = d[i+2];
      d[i]   = Math.min(255, r*0.393 + g*0.769 + b*0.189);
      d[i+1] = Math.min(255, r*0.349 + g*0.686 + b*0.168);
      d[i+2] = Math.min(255, r*0.272 + g*0.534 + b*0.131);
    } else if (filter === 'contrast') {
      const factor = 1.8;
      d[i]   = Math.min(255, Math.max(0, (d[i]   - 128) * factor + 128));
      d[i+1] = Math.min(255, Math.max(0, (d[i+1] - 128) * factor + 128));
      d[i+2] = Math.min(255, Math.max(0, (d[i+2] - 128) * factor + 128));
    } else if (filter === 'darken') {
      d[i] *= 0.6; d[i+1] *= 0.6; d[i+2] *= 0.6;
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

function wrapText(ctx, text, maxWidth) {
  const isLatin = /^[\x00-\x7F\s]+$/.test(text);
  const tokens = isLatin ? text.split(' ') : text.split('');
  const lines = [];
  let line = '';
  for (const token of tokens) {
    const test = line + (isLatin && line ? ' ' : '') + token;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = token;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function renderMeme(canvas, img, text, style) {
  const SIZE = 480;
  canvas.width = SIZE;
  canvas.height = SIZE;
  const ctx = canvas.getContext('2d');

  // Draw image (cover fit)
  const scale = Math.max(SIZE / img.width, SIZE / img.height);
  const sw = img.width * scale, sh = img.height * scale;
  const sx = (SIZE - sw) / 2, sy = (SIZE - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh);

  // Apply filter
  applyFilter(ctx, style.filter, SIZE, SIZE);

  // Text setup
  const fontSize = Math.round(SIZE * 0.085);
  const fontStr = `${style.font === 'Impact' ? 'bold ' : ''}${fontSize}px "${style.font}", Impact, sans-serif`;
  ctx.font = fontStr;
  ctx.textAlign = 'center';

  const padding = 20;
  const maxW = SIZE - padding * 2;
  const lines = wrapText(ctx, text, maxW);
  const lineH = fontSize * 1.2;
  const blockH = lines.length * lineH;

  // Position
  let startY;
  if (style.pos === 'top') startY = padding + fontSize;
  else if (style.pos === 'bottom') startY = SIZE - padding - blockH + fontSize;
  else startY = (SIZE - blockH) / 2 + fontSize; // center

  // Background bar
  if (style.bg) {
    const barPad = 12;
    ctx.fillStyle = style.bg;
    ctx.fillRect(0, startY - fontSize - barPad, SIZE, blockH + barPad * 2);
  }

  // Draw text lines
  lines.forEach((line, i) => {
    const y = startY + i * lineH;
    if (style.strokeW > 0 && style.stroke) {
      ctx.strokeStyle = style.stroke;
      ctx.lineWidth = style.strokeW;
      ctx.lineJoin = 'round';
      ctx.strokeText(line, SIZE / 2, y);
    }
    ctx.fillStyle = style.color;
    ctx.fillText(line, SIZE / 2, y);
  });
}

function generateMemes() {
  const grid = document.getElementById('meme-grid');
  grid.innerHTML = '';

  STYLES.forEach(style => {
    const card = document.createElement('div');
    card.className = 'meme-card';

    const canvas = document.createElement('canvas');
    canvas.className = 'meme-canvas';
    renderMeme(canvas, sourceImage, memeText.value.trim(), style);

    const footer = document.createElement('div');
    footer.className = 'card-footer';

    const label = document.createElement('div');
    label.className = 'style-name';
    label.textContent = style.name;

    const dlBtn = document.createElement('button');
    dlBtn.className = 'dl-btn';
    dlBtn.textContent = '↓ SAVE';
    dlBtn.addEventListener('click', () => downloadCanvas(canvas, `meme-${style.name.toLowerCase().replace(/\s+/g,'-')}.png`));

    footer.appendChild(label);
    footer.appendChild(dlBtn);
    card.appendChild(canvas);
    card.appendChild(footer);
    grid.appendChild(card);
  });
}

function downloadCanvas(canvas, filename) {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}
</script>

</body>
</html>
