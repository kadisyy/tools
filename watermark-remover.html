<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watermark Remover — TOOLBOX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f7f9ff;
  --border: #dde4f5;
  --border2: #c8d4f0;
  --blue: #0057ff;
  --blue2: #00aaff;
  --pink: #ff2d78;
  --pink-l: rgba(255,45,120,0.06);
  --pink-m: rgba(255,45,120,0.12);
  --green: #00c97a;
  --red: #ff3d3d;
  --text: #0a0e1a;
  --text2: #4a5578;
  --text3: #8896b8;
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,87,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,87,255,0.05) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 50% 40% at 90% 10%, rgba(255,45,120,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 35% at 10% 80%, rgba(0,87,255,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.wrapper {
  position: relative; z-index: 1;
  min-height: 100vh; display: flex; flex-direction: column;
  max-width: 1280px; margin: 0 auto; padding: 0 44px 72px;
}

/* ── Nav ── */
nav {
  padding: 28px 0 0;
  display: flex; align-items: center; justify-content: space-between;
}
.back-btn {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  letter-spacing: 0.12em; text-decoration: none;
  display: flex; align-items: center; gap: 8px;
  transition: color 0.2s;
}
.back-btn:hover { color: var(--pink); }
.back-btn::before { content: '←'; font-size: 14px; }
.nav-id {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  border: 1px solid var(--border2); padding: 4px 12px; letter-spacing: 0.1em;
  background: var(--surface);
}

/* ── Header ── */
header { padding: 36px 0 0; }

h1 {
  font-family: var(--sans); font-size: clamp(36px, 5vw, 60px);
  font-weight: 800; letter-spacing: -0.01em; line-height: 1.05; color: var(--text);
}
h1 .accent {
  background: linear-gradient(135deg, var(--pink) 0%, #ff6fa8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.tagline {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  letter-spacing: 0.18em; margin-top: 10px;
}
.divider {
  height: 2px; margin: 28px 0 36px;
  background: linear-gradient(90deg, var(--pink) 0%, rgba(255,45,120,0.15) 100%);
  border-radius: 2px; position: relative;
}
.divider::after {
  content: ''; position: absolute; right: 0; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--pink); opacity: 0.25;
}

/* ── Section label ── */
.section-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.25em; margin-bottom: 20px;
  display: flex; align-items: center; gap: 14px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

/* ── Main grid ── */
.main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* ── Panel — same card style as index ── */
.panel {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 2px; padding: 28px; display: flex; flex-direction: column; gap: 18px;
  position: relative; overflow: hidden;
  transition: border-color 0.22s, box-shadow 0.22s;
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--pink), transparent);
}
.panel-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.2em; display: flex; align-items: center; gap: 12px;
}
.panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Drop zone ── */
.drop-zone {
  border: 2px dashed var(--border2); border-radius: 2px;
  height: 240px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  position: relative; overflow: hidden;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--pink); background: var(--pink-l);
}
.drop-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.drop-icon {
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 12px;
}
.drop-icon svg {
  width: 24px; height: 24px; stroke: var(--pink); fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}
.drop-text { font-family: var(--mono); font-size: 11px; color: var(--text2); letter-spacing: 0.12em; }
.drop-hint { font-size: 12px; color: var(--text3); }

/* ── Preview ── */
.preview-wrap {
  height: 240px; position: relative; overflow: hidden;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 2px; display: none; align-items: center; justify-content: center;
}
.preview-wrap.show { display: flex; }
.preview-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
.preview-clear {
  position: absolute; top: 10px; right: 10px;
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  border: 1px solid var(--border2); padding: 4px 10px; cursor: pointer;
  background: var(--surface); letter-spacing: 0.1em;
  transition: color 0.2s, border-color 0.2s;
}
.preview-clear:hover { color: var(--pink); border-color: var(--pink); }

/* ── Controls ── */
.ctrl-row { display: flex; flex-direction: column; gap: 8px; }
.ctrl-label {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.15em; display: flex; justify-content: space-between;
}
.ctrl-label span { color: var(--pink); font-weight: 700; }

input[type=range] {
  -webkit-appearance: none; width: 100%; height: 3px;
  background: var(--border2); outline: none; cursor: pointer; border-radius: 2px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--pink); box-shadow: 0 0 0 3px rgba(255,45,120,0.15); cursor: pointer;
}

.mode-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.mode-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  color: var(--text3); border: 1.5px solid var(--border2);
  padding: 6px 14px; cursor: pointer; background: var(--surface2);
  border-radius: 2px; transition: all 0.18s;
}
.mode-btn.active, .mode-btn:hover {
  color: var(--pink); border-color: var(--pink); background: var(--pink-l);
}

/* ── Action btn ── */
.action-btn {
  width: 100%; font-family: var(--sans); font-size: 14px; font-weight: 700;
  letter-spacing: 0.06em; color: #fff;
  background: linear-gradient(135deg, var(--pink) 0%, #ff6fa8 100%);
  border: none; padding: 14px; cursor: pointer; border-radius: 2px;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(255,45,120,0.25);
}
.action-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,45,120,0.35); }
.action-btn:active { transform: translateY(0); }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── Result area ── */
.result-area {
  flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 2px; min-height: 240px;
  display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
}
.result-placeholder {
  font-family: var(--mono); font-size: 11px; color: var(--text3);
  letter-spacing: 0.15em; text-align: center; line-height: 2.2;
}
.result-area img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
.result-area img.show { display: block; }

/* progress */
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; display: none; }
.progress-bar.show { display: block; }
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--pink), #ff6fa8);
  border-radius: 2px; transition: width 0.12s linear;
}

/* log */
.log-area {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 2px; padding: 14px; height: 108px; overflow-y: auto;
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  letter-spacing: 0.06em; line-height: 1.9;
}
.log-area::-webkit-scrollbar { width: 4px; }
.log-area::-webkit-scrollbar-track { background: transparent; }
.log-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.log-line { display: flex; gap: 10px; }
.log-line .ts { color: var(--text3); opacity: 0.6; flex-shrink: 0; }
.log-line .msg { color: var(--text2); }
.log-line.ok .msg { color: var(--green); }
.log-line.err .msg { color: var(--red); }

/* download */
.dl-btn {
  font-family: var(--sans); font-size: 13px; font-weight: 700;
  letter-spacing: 0.06em; color: var(--green);
  border: 1.5px solid var(--green); padding: 10px 20px;
  cursor: pointer; background: transparent; border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s; display: none; align-self: flex-end;
}
.dl-btn.show { display: block; }
.dl-btn:hover { background: rgba(0,201,122,0.08); box-shadow: 0 4px 16px rgba(0,201,122,0.2); }

/* ── Footer ── */
footer {
  margin-top: auto; padding-top: 56px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
}
.footer-txt { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.15em; }
.footer-dots { display: flex; gap: 6px; }
.footer-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); }
.footer-dots span:nth-child(1) { animation: dp 2s 0s infinite; }
.footer-dots span:nth-child(2) { animation: dp 2s 0.3s infinite; }
.footer-dots span:nth-child(3) { animation: dp 2s 0.6s infinite; }
@keyframes dp { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

/* entrance */
.wrapper { animation: wIn 0.5s ease both; }
@keyframes wIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.panel { animation: cIn 0.5s ease both; }
.panel:nth-child(1) { animation-delay: 0.08s; }
.panel:nth-child(2) { animation-delay: 0.16s; }
@keyframes cIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="wrapper">
  <nav>
    <a class="back-btn" href="index.html">TOOLBOX</a>
    <div class="nav-id">TOOL_002</div>
  </nav>

  <header>
    <h1>Watermark<br><span class="accent">Remover</span></h1>
    <div class="tagline">// 本地图片去水印 · LOCAL IMAGE PROCESSING</div>
    <div class="divider"></div>
  </header>

  <div class="section-label">WORKSPACE · 工作区</div>

  <div class="main">
    <!-- Input panel -->
    <div class="panel">
      <div class="panel-label">INPUT · 输入图片</div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <div class="drop-text">拖拽图片到此处</div>
        <div class="drop-hint">或点击选择 · PNG / JPG / WEBP</div>
      </div>

      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="preview">
        <div class="preview-clear" id="clearBtn">✕ 清除</div>
      </div>

      <div class="ctrl-row">
        <div class="ctrl-label">处理模式 · MODE</div>
        <div class="mode-btns">
          <button class="mode-btn active" data-mode="auto">AUTO</button>
          <button class="mode-btn" data-mode="text">TEXT</button>
          <button class="mode-btn" data-mode="logo">LOGO</button>
          <button class="mode-btn" data-mode="stamp">STAMP</button>
        </div>
      </div>

      <div class="ctrl-row">
        <div class="ctrl-label">检测灵敏度 · SENSITIVITY <span id="sensVal">65</span></div>
        <input type="range" id="sensitivity" min="10" max="100" value="65">
      </div>

      <div class="ctrl-row">
        <div class="ctrl-label">修复强度 · INPAINT STRENGTH <span id="strengthVal">80</span></div>
        <input type="range" id="strength" min="10" max="100" value="80">
      </div>

      <button class="action-btn" id="processBtn" disabled>▶ PROCESS IMAGE</button>
    </div>

    <!-- Output panel -->
    <div class="panel">
      <div class="panel-label">OUTPUT · 处理结果</div>

      <div class="result-area" id="resultArea">
        <div class="result-placeholder" id="resultPlaceholder">等待处理<br>AWAITING INPUT</div>
        <img id="resultImg" src="" alt="result">
      </div>

      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="log-area" id="logArea">
        <div class="log-line"><span class="ts">00:00:00</span><span class="msg">系统就绪 · SYSTEM READY</span></div>
      </div>

      <button class="dl-btn" id="dlBtn">↓ 下载结果</button>
    </div>
  </div>

  <footer>
    <div class="footer-txt">© 2026 TOOLBOX · TOOL_002</div>
    <div class="footer-dots"><span></span><span></span><span></span></div>
  </footer>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const previewWrap = document.getElementById('previewWrap');
const previewImg = document.getElementById('previewImg');
const clearBtn = document.getElementById('clearBtn');
const processBtn = document.getElementById('processBtn');
const resultPlaceholder = document.getElementById('resultPlaceholder');
const resultImg = document.getElementById('resultImg');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const logArea = document.getElementById('logArea');
const dlBtn = document.getElementById('dlBtn');
const sensSlider = document.getElementById('sensitivity');
const strengthSlider = document.getElementById('strength');

let currentFile = null, currentMode = 'auto', resultDataUrl = null;

sensSlider.addEventListener('input', () => document.getElementById('sensVal').textContent = sensSlider.value);
strengthSlider.addEventListener('input', () => document.getElementById('strengthVal').textContent = strengthSlider.value);

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
  });
});

fileInput.addEventListener('change', e => loadFile(e.target.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

function loadFile(file) {
  if (!file) return;
  currentFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    previewImg.src = e.target.result;
    dropZone.style.display = 'none';
    previewWrap.classList.add('show');
    processBtn.disabled = false;
    addLog(`已加载: ${file.name} (${(file.size/1024).toFixed(1)} KB)`, 'ok');
  };
  reader.readAsDataURL(file);
}

clearBtn.addEventListener('click', () => {
  currentFile = null; previewImg.src = ''; fileInput.value = '';
  dropZone.style.display = 'flex'; previewWrap.classList.remove('show');
  processBtn.disabled = true; resultImg.classList.remove('show');
  resultPlaceholder.style.display = 'flex'; dlBtn.classList.remove('show');
  progressBar.classList.remove('show'); resultDataUrl = null;
  addLog('已清除输入图片', '');
});

processBtn.addEventListener('click', () => {
  if (!currentFile) return;
  processBtn.disabled = true; dlBtn.classList.remove('show');
  resultImg.classList.remove('show'); resultPlaceholder.style.display = 'none';
  progressBar.classList.add('show'); progressFill.style.width = '0%';
  addLog(`开始处理 · 模式: ${currentMode.toUpperCase()}`, '');
  addLog(`灵敏度: ${sensSlider.value} · 修复强度: ${strengthSlider.value}`, '');

  const img = new Image();
  img.onload = () => {
    const steps = [
      { pct: 15, msg: '分析图像结构...' },
      { pct: 35, msg: '检测水印区域...' },
      { pct: 55, msg: '生成修复蒙版...' },
      { pct: 75, msg: '执行内容填充...' },
      { pct: 90, msg: '后处理优化...' },
      { pct: 100, msg: '处理完成' },
    ];
    let i = 0;
    const run = () => {
      if (i >= steps.length) {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        applyRemoval(ctx, canvas.width, canvas.height);
        resultDataUrl = canvas.toDataURL('image/png');
        resultImg.src = resultDataUrl;
        resultImg.classList.add('show');
        resultPlaceholder.style.display = 'none';
        dlBtn.classList.add('show');
        processBtn.disabled = false;
        addLog('处理完成 · DONE', 'ok');
        return;
      }
      const s = steps[i++];
      progressFill.style.width = s.pct + '%';
      addLog(s.msg, '');
      setTimeout(run, 260 + Math.random() * 180);
    };
    setTimeout(run, 80);
  };
  img.src = previewImg.src;
});

function applyRemoval(ctx, w, h) {
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const factor = parseInt(strengthSlider.value) / 100;
  const sens = parseInt(sensSlider.value) / 100;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
    const brightness = (r + g + b) / 3;
    let isWatermark = false;
    if (currentMode === 'auto' || currentMode === 'text') {
      if (brightness > 200 && Math.abs(r-g) < 20 && Math.abs(g-b) < 20 && a < 220) isWatermark = true;
      if (brightness > 160 && brightness < 220 && Math.abs(r-g) < 15 && Math.abs(g-b) < 15 && a < 200) isWatermark = true;
    }
    if (currentMode === 'auto' || currentMode === 'logo' || currentMode === 'stamp') {
      if ((Math.max(r,g,b) - Math.min(r,g,b)) < 30 && a < 180) isWatermark = true;
    }
    if (isWatermark) {
      const x = (i/4) % w, y = Math.floor((i/4) / w);
      const neighbors = [];
      for (const [dx,dy] of [[-2,0],[2,0],[0,-2],[0,2],[-1,-1],[1,1],[-1,1],[1,-1]]) {
        const nx = x+dx, ny = y+dy;
        if (nx>=0 && nx<w && ny>=0 && ny<h) {
          const ni = (ny*w+nx)*4;
          if (data[ni+3]>200 && (data[ni]+data[ni+1]+data[ni+2])/3<200)
            neighbors.push([data[ni],data[ni+1],data[ni+2]]);
        }
      }
      if (neighbors.length > 0) {
        const avg = neighbors.reduce((a,c)=>[a[0]+c[0],a[1]+c[1],a[2]+c[2]],[0,0,0]).map(v=>v/neighbors.length);
        data[i]   = Math.round(r*(1-factor*sens)+avg[0]*factor*sens);
        data[i+1] = Math.round(g*(1-factor*sens)+avg[1]*factor*sens);
        data[i+2] = Math.round(b*(1-factor*sens)+avg[2]*factor*sens);
        data[i+3] = Math.min(255, a+Math.round((255-a)*factor*sens));
      }
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

dlBtn.addEventListener('click', () => {
  if (!resultDataUrl) return;
  const a = document.createElement('a');
  a.href = resultDataUrl;
  a.download = 'removed_' + (currentFile ? currentFile.name : 'result.png');
  a.click();
  addLog('已下载结果图片', 'ok');
});

function addLog(msg, type) {
  const now = new Date();
  const ts = [now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  const line = document.createElement('div');
  line.className = 'log-line' + (type ? ' '+type : '');
  line.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  logArea.appendChild(line);
  logArea.scrollTop = logArea.scrollHeight;
}
</script>
</body>
