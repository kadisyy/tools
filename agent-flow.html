<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Flow Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f7f8fa;
  --border: #e2e6ed;
  --accent: #0057ff;
  --accent2: #00d4ff;
  --accent3: #ff3d6e;
  --text: #0a0e1a;
  --text2: #4a5568;
  --text3: #8896a8;
  --done: #00c97a;
  --fail: #ff3d6e;
  --glow: rgba(0,87,255,0.15);
  --mono: 'Space Mono', monospace;
  --sans: 'Syne', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--text);position:relative}

/* Animated grid background */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,87,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,87,255,0.04) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;z-index:0;
}

.app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
.header{
  height:56px;display:flex;align-items:center;gap:16px;
  padding:0 24px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  position:relative;
}
.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));
}
.logo{
  font-family:var(--mono);font-size:15px;font-weight:700;
  color:var(--accent);letter-spacing:0.05em;
  display:flex;align-items:center;gap:8px;
}
.logo-dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px var(--accent),0 0 16px rgba(0,87,255,0.4);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.85)}}

.header-badge{
  font-family:var(--mono);font-size:12px;padding:3px 10px;
  border:1px solid var(--border);border-radius:2px;
  color:var(--text3);background:var(--surface2);
  letter-spacing:0.05em;
}
.header-final{
  font-size:13px;color:var(--text2);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.nav-btns{display:flex;gap:6px;margin-left:auto}
.nav-btn{
  font-family:var(--mono);font-size:12px;
  padding:5px 12px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);
  cursor:pointer;border-radius:2px;transition:all 0.15s;
  letter-spacing:0.03em;
}
.nav-btn:hover:not(:disabled){
  border-color:var(--accent);color:var(--accent);
  background:rgba(0,87,255,0.04);
}
.nav-btn:disabled{opacity:0.3;cursor:default}

/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── TIMELINE ── */
.timeline{
  width:280px;min-width:240px;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:16px 0;
}
.phase-label{
  font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;
  color:var(--text3);padding:12px 16px 6px;
  display:flex;align-items:center;gap:8px;
}
.phase-label::after{content:'';flex:1;height:1px;background:var(--border)}

.tl-item{
  padding:10px 16px 10px 20px;cursor:pointer;
  border-left:3px solid transparent;
  transition:all 0.12s;position:relative;
}
.tl-item:hover{background:var(--surface2)}
.tl-item.active{
  background:rgba(0,87,255,0.04);
  border-left-color:var(--accent);
}
.tl-item.s-failed{border-left-color:var(--fail)!important}

.tl-row{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.tl-num{
  font-family:var(--mono);font-size:11px;color:var(--text3);
  min-width:26px;font-weight:700;
}
.tl-title{
  font-size:13px;font-weight:600;color:var(--text);
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.tl-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--done);
}
.s-failed .tl-dot{background:var(--fail)}
.tl-action{
  font-family:var(--mono);font-size:11px;color:var(--accent);
  padding-left:30px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── DETAIL ── */
.detail{flex:1;overflow-y:auto;padding:28px 32px;background:var(--bg)}
.detail-empty{
  display:flex;align-items:center;justify-content:center;
  height:100%;font-family:var(--mono);font-size:12px;
  color:var(--text3);letter-spacing:0.05em;
}

.step-title{
  font-family:var(--sans);font-size:24px;font-weight:800;
  color:var(--text);margin-bottom:8px;line-height:1.2;
}
.step-meta{
  display:flex;gap:12px;align-items:center;
  font-family:var(--mono);font-size:12px;color:var(--text3);
  margin-bottom:24px;letter-spacing:0.05em;
}
.meta-status-done{color:var(--done)}
.meta-status-failed{color:var(--fail)}

.section{margin-bottom:20px}
.sec-label{
  font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;
  color:var(--text3);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* Thought */
.thought{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:16px;
  font-size:14px;line-height:1.75;color:var(--text2);
  max-height:180px;overflow:hidden;position:relative;
  transition:max-height 0.3s ease;
}
.thought.open{max-height:600px}
.thought-fade{
  position:absolute;bottom:0;left:0;right:0;height:48px;
  background:linear-gradient(transparent,var(--surface));
  pointer-events:none;
}
.thought.open .thought-fade{display:none}
.expand-btn{
  font-family:var(--mono);font-size:11px;color:var(--accent);
  cursor:pointer;margin-top:6px;display:inline-block;
  letter-spacing:0.05em;
}
.expand-btn:hover{text-decoration:underline}

/* Action */
.action-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;overflow:hidden;
}
.action-name{
  padding:8px 14px;
  background:linear-gradient(135deg,rgba(0,87,255,0.06),rgba(0,212,255,0.04));
  border-bottom:1px solid var(--border);
  font-family:var(--mono);font-size:13px;font-weight:700;
  color:var(--accent);letter-spacing:0.05em;
  display:flex;align-items:center;gap:8px;
}
.action-name::before{
  content:'⚡';font-size:11px;
}
.action-input{
  padding:14px;font-family:var(--mono);font-size:12px;
  color:var(--text2);white-space:pre-wrap;word-break:break-all;
  max-height:200px;overflow-y:auto;line-height:1.6;
}

/* Outputs */
.out-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;overflow:hidden;margin-bottom:10px;
}
.out-header{
  padding:7px 14px;background:var(--surface2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.out-badge{
  font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:2px 8px;border-radius:2px;
}
.bt-text{background:rgba(0,87,255,0.08);color:var(--accent)}
.bt-markdown{background:rgba(0,201,122,0.08);color:var(--done)}
.bt-html{background:rgba(255,61,110,0.08);color:var(--fail)}
.bt-code{background:rgba(255,165,0,0.08);color:#f59e0b}

.out-body{
  padding:14px;font-family:var(--mono);font-size:12px;
  color:var(--text2);white-space:pre-wrap;word-break:break-all;
  max-height:280px;overflow-y:auto;line-height:1.65;
}
.out-body.md-body{font-family:var(--sans);font-size:14px;white-space:normal}

.preview-btn{
  font-family:var(--mono);font-size:11px;color:var(--accent);
  cursor:pointer;margin-left:auto;letter-spacing:0.03em;
}
.preview-btn:hover{text-decoration:underline}
iframe.html-frame{
  width:100%;height:480px;border:none;
  border-top:1px solid var(--border);background:#fff;
}

/* Markdown */
.md-body h1,.md-body h2,.md-body h3{
  font-family:var(--sans);font-weight:800;
  color:var(--text);margin:12px 0 6px;
}
.md-body h1{font-size:18px}
.md-body h2{font-size:15px}
.md-body h3{font-size:13px;color:var(--accent)}
.md-body p{margin:4px 0;color:var(--text2);line-height:1.7}
.md-body strong{color:var(--text);font-weight:700}
.md-body code{
  font-family:var(--mono);font-size:10px;
  background:rgba(0,87,255,0.06);padding:1px 5px;
  border-radius:2px;color:var(--accent);
}
.md-table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
.md-table th,.md-table td{
  border:1px solid var(--border);padding:7px 12px;text-align:left;
}
.md-table th{
  background:rgba(0,87,255,0.04);
  font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--accent);letter-spacing:0.05em;text-transform:uppercase;
}
.md-table tr:nth-child(even) td{background:var(--surface2)}

/* Upload screen */
.upload-screen{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100vh;padding:24px;
  position:relative;z-index:1;
}
.upload-hero{
  font-family:var(--sans);font-size:42px;font-weight:800;
  color:var(--text);margin-bottom:6px;letter-spacing:-0.02em;
  text-align:center;
}
.upload-hero span{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.upload-sub{
  font-family:var(--mono);font-size:13px;color:var(--text3);
  margin-bottom:40px;letter-spacing:0.05em;text-align:center;
}
.drop-zone{
  width:480px;border:2px dashed var(--border);border-radius:6px;
  padding:40px;text-align:center;cursor:pointer;
  transition:all 0.2s;background:var(--surface);
  position:relative;overflow:hidden;
}
.drop-zone::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,87,255,0.03),rgba(0,212,255,0.03));
  opacity:0;transition:opacity 0.2s;
}
.drop-zone:hover::before,.drop-zone.over::before{opacity:1}
.drop-zone:hover,.drop-zone.over{border-color:var(--accent)}
.drop-icon{font-size:36px;margin-bottom:12px}
.drop-title{font-family:var(--sans);font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.drop-hint{font-family:var(--mono);font-size:12px;color:var(--text3);letter-spacing:0.03em}
#file-input{display:none}

.divider{
  display:flex;align-items:center;gap:12px;
  width:480px;margin:20px 0;
  font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:0.1em;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.paste-box{width:480px}
.paste-box textarea{
  width:100%;height:100px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px;color:var(--text2);
  font-family:var(--mono);font-size:12px;padding:12px;
  resize:vertical;outline:none;transition:border-color 0.15s;
  line-height:1.5;
}
.paste-box textarea:focus{border-color:var(--accent)}
.parse-btn{
  margin-top:8px;padding:10px 24px;
  background:var(--accent);color:#fff;border:none;
  border-radius:3px;cursor:pointer;
  font-family:var(--mono);font-size:13px;font-weight:700;
  letter-spacing:0.05em;transition:all 0.15s;
}
.parse-btn:hover{background:#0047d4;transform:translateY(-1px)}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#c0c8d4}
</style>
</head>
<body>
<div class="app" id="app">

<!-- UPLOAD -->
<div class="upload-screen" id="upload-screen">
  <div class="upload-hero">Agent Flow <span>Viewer</span></div>
  <div class="upload-sub">// REACT-AGENT EXECUTION TRACE VISUALIZER</div>
  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">⬡</div>
    <div class="drop-title">拖拽 JSON 文件到此处</div>
    <div class="drop-hint">或点击选择文件 · 支持 react-agent 格式</div>
    <input type="file" id="file-input" accept=".json">
  </div>
  <div class="divider">OR PASTE JSON</div>
  <div class="paste-box">
    <textarea id="json-paste" placeholder='{"version":1,"type":"react-agent","steps":[...]}'></textarea>
    <button class="parse-btn" onclick="loadFromPaste()">PARSE &amp; VISUALIZE →</button>
  </div>
</div>

<!-- VIEWER -->
<div id="viewer-screen" style="display:none;flex-direction:column;height:100vh">
  <div class="header">
    <div class="logo"><div class="logo-dot"></div>AGENT FLOW</div>
    <div class="header-badge" id="hdr-type">react-agent</div>
    <div class="header-badge" id="hdr-steps">0 steps</div>
    <div class="header-final" id="hdr-final"></div>
    <div class="nav-btns">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">← PREV</button>
      <button class="nav-btn" id="btn-next" onclick="navigate(1)">NEXT →</button>
      <button class="nav-btn" onclick="resetViewer()">↺ RESET</button>
    </div>
  </div>
  <div class="main">
    <div class="timeline" id="timeline"></div>
    <div class="detail" id="detail">
      <div class="detail-empty">SELECT A STEP →</div>
    </div>
  </div>
</div>

</div>
<script>
let data=null,sel=null;

// file
document.getElementById('file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>loadJSON(ev.target.result);r.readAsText(f);
});
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('over');
  const f=e.dataTransfer.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>loadJSON(ev.target.result);r.readAsText(f);
});
function loadFromPaste(){
  const t=document.getElementById('json-paste').value.trim();
  if(t)loadJSON(t);
}
function loadJSON(txt){
  try{data=JSON.parse(txt);renderViewer();}
  catch(e){alert('JSON 解析失败: '+e.message);}
}
function resetViewer(){
  data=null;sel=null;
  document.getElementById('upload-screen').style.display='flex';
  document.getElementById('viewer-screen').style.display='none';
  document.getElementById('json-paste').value='';
  document.getElementById('file-input').value='';
}

function renderViewer(){
  document.getElementById('upload-screen').style.display='none';
  const vs=document.getElementById('viewer-screen');
  vs.style.display='flex';
  const steps=data.steps||[];
  document.getElementById('hdr-type').textContent=data.type||'agent';
  document.getElementById('hdr-steps').textContent=steps.length+' STEPS';
  const fc=data.final_content||'';
  document.getElementById('hdr-final').textContent=fc.length>80?fc.slice(0,80)+'…':fc;
  renderTimeline(steps);
  if(steps.length)selectStep(steps[0].id);
}

function renderTimeline(steps){
  const tl=document.getElementById('timeline');
  tl.innerHTML='';
  let lastPhase=null;
  steps.forEach((s,i)=>{
    if(s.phase&&s.phase!==lastPhase){
      const lbl=document.createElement('div');
      lbl.className='phase-label';lbl.textContent=s.phase;
      tl.appendChild(lbl);lastPhase=s.phase;
    }
    const el=document.createElement('div');
    el.className='tl-item s-'+(s.status||'done');
    el.id='tl-'+s.id;
    el.onclick=()=>selectStep(s.id);
    const act=s.action?s.action:(s.outputs?.length?s.outputs.length+' output(s)':'');
    el.innerHTML=`<div class="tl-row">
      <span class="tl-num">#${String(i+1).padStart(2,'0')}</span>
      <span class="tl-title" title="${esc(s.title||'')}">${esc(s.title||'Step')}</span>
      <span class="tl-dot"></span>
    </div>${act?`<div class="tl-action">${esc(act)}</div>`:''}`;
    tl.appendChild(el);
  });
}

function selectStep(id){
  sel=id;
  document.querySelectorAll('.tl-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('tl-'+id);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const steps=data.steps||[];
  const idx=steps.findIndex(s=>s.id===id);
  document.getElementById('btn-prev').disabled=idx<=0;
  document.getElementById('btn-next').disabled=idx>=steps.length-1;
  const step=steps.find(s=>s.id===id);
  if(step)renderDetail(step);
}

function navigate(d){
  const steps=data.steps||[];
  const idx=steps.findIndex(s=>s.id===sel);
  const n=steps[idx+d];if(n)selectStep(n.id);
}

function renderDetail(step){
  const det=document.getElementById('detail');
  let h='';
  h+=`<div class="step-title">${esc(step.title||'Step')}</div>`;
  h+=`<div class="step-meta">
    <span class="meta-status-${step.status==='failed'?'failed':'done'}">${step.status==='failed'?'✗ FAILED':'✓ DONE'}</span>
    <span>${esc(step.phase||'')}</span>
    <span>${esc(step.id)}</span>
  </div>`;

  if(step.thought){
    const tid='th-'+step.id;
    h+=`<div class="section">
      <div class="sec-label">Thought</div>
      <div class="thought" id="${tid}">${esc(step.thought)}<div class="thought-fade"></div></div>
      <span class="expand-btn" onclick="toggleThought('${tid}',this)">展开全部 ↓</span>
    </div>`;
  }

  if(step.action){
    let inp=step.action_input||'';
    try{inp=JSON.stringify(JSON.parse(typeof inp==='string'?inp:JSON.stringify(inp)),null,2);}catch(e){}
    h+=`<div class="section">
      <div class="sec-label">Action</div>
      <div class="action-card">
        <div class="action-name">${esc(step.action)}</div>
        <div class="action-input">${esc(inp)}</div>
      </div>
    </div>`;
  }

  if(step.outputs&&step.outputs.length){
    h+=`<div class="section"><div class="sec-label">Outputs (${step.outputs.length})</div>`;
    step.outputs.forEach((o,i)=>{
      const t=o.output_type||'text';
      h+=`<div class="out-card">
        <div class="out-header">
          <span class="out-badge bt-${t}">${t}</span>
          ${t==='html'?`<span class="preview-btn" onclick="togglePreview(this,'${step.id}',${i})">预览 HTML</span>`:''}
        </div>
        <div class="out-body${t==='markdown'?' md-body':''}" id="ob-${step.id}-${i}">
          ${t==='markdown'?renderMd(o.content||''):esc(o.content||'')}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  det.innerHTML=h;
  det._outputs=step.outputs;
  det._sid=step.id;
}

function toggleThought(id,btn){
  const el=document.getElementById(id);
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'收起 ↑':'展开全部 ↓';
}

function togglePreview(btn,sid,idx){
  const det=document.getElementById('detail');
  const ob=document.getElementById('ob-'+sid+'-'+idx);
  const existing=ob.parentElement.querySelector('iframe.html-frame');
  if(existing){existing.remove();btn.textContent='预览 HTML';return;}
  const iframe=document.createElement('iframe');
  iframe.className='html-frame';
  iframe.srcdoc=(det._outputs[idx]||{}).content||'';
  ob.parentElement.appendChild(iframe);
  btn.textContent='关闭预览';
}

function renderMd(md){
  const lines=md.split('\n');
  let out='',tbl=[],inTbl=false;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(l.trim().startsWith('|')){inTbl=true;tbl.push(l);}
    else{
      if(inTbl){out+=renderMdTable(tbl);tbl=[];inTbl=false;}
      const hm=l.match(/^(#{1,4})\s+(.+)/);
      if(hm){out+=`<h${hm[1].length}>${esc(hm[2])}</h${hm[1].length}>`;}
      else if(!l.trim()){out+='<br>';}
      else{
        let x=l.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
        x=x.replace(/`(.+?)`/g,'<code>$1</code>');
        out+=`<p>${x}</p>`;
      }
    }
  }
  if(inTbl)out+=renderMdTable(tbl);
  return out;
}
function renderMdTable(lines){
  const rows=lines.filter(l=>!/^\|[-| :]+\|$/.test(l.trim()));
  if(!rows.length)return'';
  let h='<table class="md-table">';
  rows.forEach((r,i)=>{
    const cells=r.split('|').slice(1,-1);
    const tag=i===0?'th':'td';
    h+='<tr>'+cells.map(c=>`<${tag}>${esc(c.trim())}</${tag}>`).join('')+'</tr>';
  });
  return h+'</table>';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();navigate(-1);}
});
